    <!-- [Safety] Global Error Handler & Loading Watchdog -->
    <script>
        // 1. Global Error Handler (Must be non-module, non-babel to catch early errors)
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Global Error:', msg, error);
            var root = document.getElementById('root');
            if (root && (root.innerHTML.trim() === '' || root.innerHTML.includes('лЎңл”© мӨ‘'))) {
                root.innerHTML = '<div style="padding:20px;text-align:center;color:red;margin-top:50px;font-family:sans-serif;"><h1>вҡ пёҸ м•ұ мӢӨн–ү мӨ‘ мҳӨлҘҳ л°ңмғқ</h1><p style="color:#666;margin:10px 0;">'+msg+'</p><button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#333;color:white;border:none;border-radius:5px;cursor:pointer;">мғҲлЎңкі м№Ё</button></div>';
            }
            return false;
        };

        // 2. Loading Watchdog (Check if React mounted within 3 seconds)
        setTimeout(function() {
            var root = document.getElementById('root');
            if (!root || root.innerHTML.trim() === '') {
                var msg = document.createElement('div');
                msg.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:white;color:#333;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:20px;text-align:center;font-family:sans-serif;";
                msg.innerHTML = '<h1 style="font-size:24px;margin-bottom:10px;">вҡ пёҸ м•ұ лЎңл”© мӢӨнҢЁ</h1><p style="color:#666;margin-bottom:20px;">3мҙҲ мқҙмғҒ нҷ”л©ҙмқҙ лӮҳмҳӨм§Җ м•Ҡмңјл©ҙ м•„лһҳ лӮҙмҡ©мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”.</p><ul style="text-align:left;display:inline-block;margin:0 0 20px 0;font-size:14px;color:#333;line-height:1.6;"><li>лёҢлқјмҡ°м Җ лІ„м „мқҙ л„Ҳл¬ҙ лӮ®м§Җ м•ҠмқҖм§Җ нҷ•мқё (iOS 12 мқҙн•ҳлҠ” мһ‘лҸҷн•ҳм§Җ м•Ҡмқ„ мҲҳ мһҲмқҢ)</li><li>мқён„°л„· м—°кІ° мғҒнғң нҷ•мқё (лқјмқҙлёҢлҹ¬лҰ¬ лЎңл”© мӢӨнҢЁ)</li><li>мһҗл°”мҠӨнҒ¬лҰҪнҠё м„Өм • нҷ•мқё</li></ul><div style="display:flex;gap:10px;"><button onclick="location.reload()" style="padding:10px 20px;background:#333;color:white;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;">мғҲлЎңкі м№Ё</button><button onclick="localStorage.clear();location.reload()" style="padding:10px 20px;background:#eee;color:#333;border:none;border-radius:8px;font-size:16px;cursor:pointer;">лҚ°мқҙн„° мҙҲкё°нҷ”</button></div>';
                document.body.appendChild(msg);
            }
        }, 3000);

            },
            // л°°мҶЎ л©”лӘЁ м„Өм •
            MEMO: {

            },
            // [Safety] лҚ°мқҙн„° ліҙнҳё м„Өм •
            PROTECTED_DATES: ['2026-02-12', '2025-02-12']
        };

        const StorageManager = { 
            // лӢЁмқј к°қмІҙлЎң м ҖмһҘн•ҳкё° мң„н•ң лһҳнҚј н•ЁмҲҳ (м¶ңл°ңм§Җ/лҸ„м°©м§Җ/л°°мҶЎлӘ©лЎқ нҶөн•©)
            saveAllData: (deliveriesData, startLocation, endLocation) => {
                try {
                    const dataToSave = {
                        deliveries: deliveriesData,
                        start_location: startLocation,
                        destination: endLocation,
                        timestamp: new Date().toISOString()
                    };
                    localStorage.setItem('deliveryData', JSON.stringify(dataToSave));
                    // н•ҳмң„ нҳёнҷҳм„ұмқ„ мң„н•ҙ к°ңлі„ нӮӨлЎңлҸ„ м ҖмһҘ
                    if (deliveriesData) localStorage.setItem(Config.STORAGE_KEYS.DELIVERIES, JSON.stringify(deliveriesData));
                    if (startLocation) localStorage.setItem(Config.STORAGE_KEYS.START_LOCATION, JSON.stringify(startLocation));
                    if (endLocation) localStorage.setItem(Config.STORAGE_KEYS.END_LOCATION, JSON.stringify(endLocation));
                } catch(e) {
                    console.error("[Storage] saveAllData failed:", e);
                }
            },
            get: (key, defaultValue = null) => {
                try {
                    const item = localStorage.getItem(key);
                    if (item === null || item === "undefined") return defaultValue;
                    return JSON.parse(item);
                } catch (e) {
                    console.warn(`[Storage] Failed to parse ${key}, using default.`, e);
                    return defaultValue;
                }
            },
            set: (key, value) => {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                } catch (e) {
                    console.error(`[Storage] Failed to save ${key}`, e);
                    alert("лёҢлқјмҡ°м Җ м ҖмһҘ кіөк°„мқҙ л¶ҖмЎұн•©лӢҲлӢӨ. мқјл¶Җ лҚ°мқҙн„°лҘј м •лҰ¬н•ҙмЈјм„ёмҡ”.");
                }
            },
            saveDeliveries: (data) => {
                // кё°мЎҙ мғҒнғңк°’(startPoint, endPoint)мқ„ к°Җм ёмҳ¬ л°©лІ•мқҙ м—ҶмңјлҜҖлЎң, localStorageм—җм„ң мқҪм–ҙмҷҖм„ң лі‘н•©
                const currentData = StorageManager.get('deliveryData') || {};
                const currentStart = StorageManager.get(Config.STORAGE_KEYS.START_LOCATION) || currentData.start_location;
                const currentEnd = StorageManager.get(Config.STORAGE_KEYS.END_LOCATION) || currentData.destination;
                StorageManager.saveAllData(data, currentStart, currentEnd);
            },
            loadDeliveries: () => {
                const unified = StorageManager.get('deliveryData');
                if (unified && unified.deliveries) return unified.deliveries;
                return StorageManager.get(Config.STORAGE_KEYS.DELIVERIES, []);
            },
            remove: (key) => {
                try {
                    localStorage.removeItem(key);
                } catch (e) {
                    console.error(`[Storage] Failed to remove ${key}`, e);
                }
            },
            clearAll: () => {
                localStorage.clear();
                console.log("[Storage] All data cleared.");
            },
            cleanupEphemeral: async () => {
                let removedCount = 0;
                try {
                    if (localStorage.getItem('mvp_validation_report')) {
                        localStorage.removeItem('mvp_validation_report');
                        removedCount++;
                    }
                } catch (e) { /* ignore */ }
                // Optional minor keys cleanup (safe to reconfigure later)
                try {
                    if (localStorage.getItem('mvp_notice')) {
                        localStorage.removeItem('mvp_notice');
                        removedCount++;
                    }
                } catch (e) { /* ignore */ }
                // Clear runtime caches (Service Worker Cache API)
                try {
                    if ('caches' in window) {
                        const keys = await caches.keys();
                        for (const k of keys) {
                            await caches.delete(k);
                            removedCount++;
                        }
                    }
                } catch (e) { /* ignore */ }
                return removedCount;
            },
            ensurePersistent: async () => {
                if (!('storage' in navigator) || !navigator.storage.persist) {
                    alert('лёҢлқјмҡ°м Җк°Җ мҳҒкө¬ м ҖмһҘ к¶Ңн•ң мҡ”мІӯмқ„ м§Җмӣҗн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.');
                    return false;
                }
                try {
                    const already = await navigator.storage.persisted();
                    if (already) {
                        alert('мқҙлҜё мҳҒкө¬ м ҖмһҘмңјлЎң м„Өм •лҗҳм–ҙ мһҲмҠөлӢҲлӢӨ.');
                        return true;
                    }
                    const ok = await navigator.storage.persist();
                    alert(ok ? 'мҳҒкө¬ м ҖмһҘ к¶Ңн•ңмқҙ мҠ№мқёлҗҳм—ҲмҠөлӢҲлӢӨ.' : 'мҳҒкө¬ м ҖмһҘ к¶Ңн•ңмқ„ м–»м§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.');
                    return ok;
                } catch (e) {
                    alert('мҳҒкө¬ м ҖмһҘ мҡ”мІӯ мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.');
                    return false;
                }
            },
            showEstimate: async () => {
                if (!('storage' in navigator) || !navigator.storage.estimate) {
                    alert('лёҢлқјмҡ°м Җк°Җ м ҖмһҘмҶҢ мӮ¬мҡ©лҹү мЎ°нҡҢлҘј м§Җмӣҗн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.');
                    return;
                }
                const est = await navigator.storage.estimate();
                const usage = Math.round((est.usage || 0) / (1024 * 1024));
                const quota = Math.round((est.quota || 0) / (1024 * 1024));
                alert(`м ҖмһҘмҶҢ мӮ¬мҡ©лҹү: ${usage}MB / н• лӢ№лҹү: ${quota}MB`);
            },
            compactDeliveriesForCloud: (data, days) => {
                try {
                    const now = new Date();
                    const cutoff = new Date(now.getTime() - (days * 24 * 60 * 60 * 1000));
                    const fmt = (d) => {
                        if (!d) return null;
                        const t = new Date(d);
                        if (isNaN(t.getTime())) return d;
                        const off = t.getTimezoneOffset() * 60000;
                        return new Date(t.getTime() - off).toISOString().split('T')[0];
                    };
                    return (data || []).filter(x => {
                        const ds = fmt(x.date);
                        const dx = new Date(ds || x.date);
                        return !isNaN(dx.getTime()) && dx >= cutoff;
                    }).map(x => ({
                        id: x.id,
                        date: x.date,
                        address: x.address,
                        phone: x.phone,
                        lat: x.lat,
                        lng: x.lng,
                        driver: x.driver,
                        completed: !!x.completed,
                        canceled: !!x.canceled,
                        cancel_type: x.cancel_type || null,
                        sequence_number: x.sequence_number || null,
                        install_fee: x.install_fee || 0,
                        yangjung: x.yangjung || 0,
                        naerim: x.naerim || 0,
                        etc_fee: x.etc_fee || 0
                    }));
                } catch (e) {
                    return data || [];
                }
            },
            exportArchive: (data, days) => {
                try {
                    const now = new Date();
                    const cutoff = new Date(now.getTime() - (days * 24 * 60 * 60 * 1000));
                    const older = (data || []).filter(x => {
                        const dx = new Date(x.date);
                        return !isNaN(dx.getTime()) && dx < cutoff;
                    });
                    const blob = new Blob([JSON.stringify(older, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
                    a.href = url;
                    a.download = `deliveries_archive_${ts}.json`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    setTimeout(() => URL.revokeObjectURL(url), 2000);

        // [нҒҙлқјмҡ°л“ң] Cloud Manager (Supabase)

            async push(deliveries) {

            async pull() {
                if (!CloudManager.client) throw new Error("м„ңлІ„к°Җ м—°кІ°лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.");

                for (let attempt = 0; attempt < 2; attempt++) {
                    try {
                        const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000));
                        const { data, error } = await Promise.race([fetchOnce(), timeout]);
                        if (error) throw error;
                        return data ? data.data : null;
                    } catch(e) {
                        if (attempt === 1) throw e;
                        console.warn('[Cloud] Pull timeout, retrying...');
                        await new Promise(r => setTimeout(r, 1000));

        // [мң нӢёлҰ¬нӢ°] UUID мғқм„ұ (crypto.randomUUID м§Җмӣҗ м•ҲлҗҳлҠ” нҷҳкІҪ лҢҖл№„)
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // [мң нӢёлҰ¬нӢ°]
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // [нғҖмһ„л§ҲнҒ¬] мӮ¬м§„м—җ мӢңк°„/лӮ м§ң/мң„м№ҳ мӣҢн„°л§ҲнҒ¬ н•©м„ұ нӣ„ мҰүмӢң к°Өлҹ¬лҰ¬ м ҖмһҘ

        // мЈјмҶҢлҘј мўҢн‘ңлЎң ліҖнҷҳн•ҳлҠ” н•ЁмҲҳ (м№ҙм№ҙмҳӨл§ө API мҷ„лІҪ м—°лҸҷ лІ„м „)
        async function geocodeAddress(address, strict = false) { 
            return new Promise((resolve) => { 
                if (!address || typeof address !== 'string') return resolve(strict ? null : { lat: 37.5665, lng: 126.9780 }); 

                // м№ҙм№ҙмҳӨл§ө м„ңл№„мҠӨ к°қмІҙк°Җ мһҲлҠ”м§Җ нҷ•мқё
                if (!window.kakao || !window.kakao.maps || !window.kakao.maps.services) {
                    console.error("Kakao Maps API services not loaded");
                    return resolve(strict ? null : getRegionalFallback(address));
                }

                // [мЈјмҶҢ м •м ң] 3лӢЁкі„ м „лһө
                // 1лӢЁкі„: лҸҷнҳёмҲҳ/мёө/кҙ„нҳё м ңкұ° нӣ„ кІҖмғү (кұҙл¬јлӘ… нҸ¬н•Ё)
                // 2лӢЁкі„: лҸ„лЎңлӘ…+лІҲм§Җл§ҢмңјлЎң мһ¬мӢңлҸ„
                // 3лӢЁкі„: мӢң/кө¬/лҸ„лЎңлӘ…л§ҢмңјлЎң мөңнӣ„ мӢңлҸ„
                const cleanAddr1 = (() => {
                    const raw = address.replace(/\(.*?\)/g, '').trim(); // кҙ„нҳё м•Ҳ м§ҖлІҲ лЁјм Җ м ңкұ°
                    const parts = raw.split(/\s+/);
                    const out = [];
                    for (let i = 0; i < parts.length; i++) {
                        const p = parts[i];
                        const prev = i > 0 ? parts[i-1] : '';
                        const afterRoad = prev.endsWith('лЎң') || prev.endsWith('кёё') || /[лЎңкёё]\d*лІҲкёё$/.test(prev);
                        if (/^\d+лҸҷ\d+нҳё$/.test(p)) break;           // 1101лҸҷ203нҳё
                        if (/^\d+лҸҷ$/.test(p) && !afterRoad) break;   // 710лҸҷ (м•„нҢҢнҠё лҸҷ)
                        if (/^\d+нҳё$/.test(p)) break;                  // 402нҳё
                        if (/^\d+мёө$/.test(p)) break;                  // 2мёө
                        if (/^\d{1,4}[мёөнҳё]$/.test(p)) break;          // 2мёө, 202нҳё л“ұ
                        if (['м•ҲмӘҪ','мҡ°мёЎ','мўҢмёЎ','лӮҙл¶Җ','м•һ','л’Ө','мҳҶ'].includes(p)) break;
                        out.push(p);
                    }
                    return out.join(' ').trim();
                })();

                // 2лӢЁкі„: лҸ„лЎңлӘ…+лІҲм§Җ (кұҙл¬јлӘ… м ңкұ°)
                const cleanAddr2 = (() => {
                    const parts = cleanAddr1.split(' ');
                    let roadIdx = -1;
                    parts.forEach((p, i) => {
                        if (p.endsWith('лЎң') || p.endsWith('кёё') || /[лЎңкёё]\d*лІҲкёё$/.test(p)) roadIdx = i;
                    });
                    return roadIdx >= 0 ? parts.slice(0, roadIdx + 2).join(' ') : parts.slice(0, 4).join(' ');
                })();

                // 3лӢЁкі„: кө¬ + лҸ„лЎңлӘ…л§Ң (лІҲм§ҖлҸ„ м ңкұ°)
                const cleanAddr3 = (() => {
                    const parts = cleanAddr1.split(' ');
                    let roadIdx = -1;
                    parts.forEach((p, i) => {
                        if (p.endsWith('лЎң') || p.endsWith('кёё') || /[лЎңкёё]\d*лІҲкёё$/.test(p)) roadIdx = i;
                    });
                    return roadIdx >= 0 ? parts.slice(0, roadIdx + 1).join(' ') : parts.slice(0, 3).join(' ');
                })();

                const geocoder = new window.kakao.maps.services.Geocoder();

                geocoder.addressSearch(cleanAddr1, (r1, s1) => {
                    if (s1 === window.kakao.maps.services.Status.OK) {
                        resolve({ lat: parseFloat(r1[0].y), lng: parseFloat(r1[0].x) });
                    } else {
                        geocoder.addressSearch(cleanAddr2, (r2, s2) => {
                            if (s2 === window.kakao.maps.services.Status.OK) {
                                resolve({ lat: parseFloat(r2[0].y), lng: parseFloat(r2[0].x) });
                            } else {
                                geocoder.addressSearch(cleanAddr3, (r3, s3) => {
                                    if (s3 === window.kakao.maps.services.Status.OK) {
                                        resolve({ lat: parseFloat(r3[0].y), lng: parseFloat(r3[0].x) });
                                    } else {
                                        console.error(`[Geocoding мӢӨнҢЁ] ${address} вҶ’ ${cleanAddr1} вҶ’ ${cleanAddr2} вҶ’ ${cleanAddr3}`);
                                        resolve(strict ? null : getRegionalFallback(address));
                                    }
                                });
                            }
                        });
                    }
                }); 
            }); 
        }
        
        // кІҖмғү мҷ„м „ мӢӨнҢЁ мӢң м§Җм—ӯлі„ мӢңмІӯ/лҸ„мІӯ мўҢн‘ң л°ҳнҷҳ (л°”лӢӨ л°©м§Җмҡ©)
        function getRegionalFallback(address) {
            if (address.includes('мқёмІң')) return { lat: 37.4563, lng: 126.7052 }; 
            if (address.includes('кІҪкё°') || address.includes('к№ҖнҸ¬')) return { lat: 37.6152, lng: 126.7156 }; 
            if (address.includes('л¶ҖмӮ°')) return { lat: 35.1796, lng: 129.0756 }; 
            if (address.includes('лҢҖкө¬')) return { lat: 35.8714, lng: 128.6014 }; 
            return { lat: 37.5665, lng: 126.9780 }; // Default: м„ңмҡёмӢңмІӯ
        }
        
        function formatAddressDisplay(address) {
            if (!address) return '';
            const s = String(address).trim().replace(/[,\u3001]/g, ' ');
            const tokens = s.split(/\s+/);
            let siDo = '';
            let guGun = '';
            let roadParts = [];
            let buildingNum = '';
            for (let i = tokens.length - 1; i >= 0; i--) {
                const t = tokens[i];
                if (!buildingNum && /^\d+(-\d+)?$/.test(t)) { buildingNum = t; continue; }
                if ((t.endsWith('лЎң') || t.endsWith('кёё') || /[лЎңкёё]\d+лІҲкёё/.test(t))) { roadParts.push(t); continue; }
                if (!guGun && (t.endsWith('кө¬') || t.endsWith('кө°') || (t.endsWith('мӢң') && t.length > 2))) { guGun = t; continue; }
                if (!siDo && (t.endsWith('мӢң') || t.endsWith('лҸ„'))) { siDo = t; }
            }
            if (roadParts.length > 0) {
                const roadFull = roadParts.slice().reverse().join(' ');
                const core = `${siDo ? siDo + ' ' : ''}${guGun ? guGun + ' ' : ''}${roadFull}${buildingNum ? ' ' + buildingNum : ''}`;
                return core.trim();
            }
            return s;
        }

        function formatTimeRange(start, minutes) {
            if (!start) return 'мҳҲм•ҪмӢңк°„';
            const [hh, mm] = start.split(':').map(x => parseInt(x, 10));
            const total = hh * 60 + mm + (parseInt(minutes, 10) || 0);
            const eh = Math.floor(total / 60);
            const em = total % 60;
            const pad = n => (n < 10 ? '0' + n : '' + n);
            return `${start} ~ ${pad(eh)}:${pad(em)}`;
        }

        function parseCustomDate(dateStr) {
            // [м•Ҳм „мһҘм№ҳ] к°’мқҙ м—Ҷмңјл©ҙ мҳӨлҠҳ лӮ м§ң л°ҳнҷҳ (Local Time - KST Support)
            if (!dateStr) {
                const d = new Date();
                const offset = d.getTimezoneOffset() * 60000;
                return new Date(d.getTime() - offset).toISOString().split('T')[0];
            }

            // м—‘м…Җ лӮ м§ң к°қмІҙмқё кІҪмҡ°
            if (dateStr instanceof Date) {
                const offset = dateStr.getTimezoneOffset() * 60000;
                return new Date(dateStr.getTime() - offset).toISOString().split('T')[0];
            }

            let str = String(dateStr).trim();

            // [к°ңм„ ] "2025. 2. 3" лҳҗлҠ” "2025/02/03" л“ұмқҳ нҳ•мӢқмқ„ "2025-02-03"мңјлЎң м •к·ңнҷ”
            // 1. л…„мӣ”мқј н•ңкёҖ нҳ•мӢқ ("2мӣ” 3мқј")
            const koreanMatch = str.match(/(\d+)мӣ”\s*(\d+)мқј/);
            if (koreanMatch) {
                const year = new Date().getFullYear();
                const month = koreanMatch[1].padStart(2, '0');
                const day = koreanMatch[2].padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            // 2. кө¬л¶„мһҗ(., /)лҘј -лЎң нҶөмқјн•ҳкі  кіөл°ұ м ңкұ°
            // мҳҲ: "2025. 02. 03" -> "2025-02-03"
            const normalized = str.replace(/[\.\/]/g, '-').replace(/\s+/g, '');
            
            // 3. YYYY-M-D нҳ•мӢқмқ„ YYYY-MM-DDлЎң ліҙм •
            const parts = normalized.split('-');
            if (parts.length === 3) {
                const year = parts[0];
                const month = parts[1].padStart(2, '0');
                const day = parts[2].padStart(2, '0');
                // м—°лҸ„к°Җ 2мһҗлҰ¬мқё кІҪмҡ° (25-02-03) мІҳлҰ¬ (м„ нғқмӮ¬н•ӯ, м—¬кё°м„  4мһҗлҰ¬ к°Җм •н•ҳлҗҳ н•„мҡ”мӢң м¶”к°Җ)
                return `${year}-${month}-${day}`;
            }
            
            return normalized; 
        }

        // [м•Ңкі лҰ¬мҰҳ] Nearest Neighbor (м¶ңл°ңм§Җ -> к°ҖмһҘ к°Җк№Ңмҡҙ кіі -> ... -> лҸ„м°©м§Җ)
        function solveTSP(startNode, nodes, endNode) {
            let current = startNode;
            let unvisited = [...nodes];
            const path = [];

            while (unvisited.length > 0) {
                // нҳ„мһ¬ мң„м№ҳм—җм„ң к°ҖмһҘ к°Җк№Ңмҡҙ л…ёл“ң м°ҫкё°
                unvisited.sort((a, b) => {
                    const distA = getDistance(current.lat, current.lng, a.lat, a.lng);
                    const distB = getDistance(current.lat, current.lng, b.lat, b.lng);
                    return distA - distB;
                });

                const next = unvisited.shift();
                path.push({
                    ...next,
                    // [мҲҳм •] кұ°лҰ¬лҠ” н•ӯмғҒ м¶ңл°ңм§Җ(startNode) кё°мӨҖмңјлЎң н‘ңмӢң
                    distanceFromPrev: getDistance(startNode.lat, startNode.lng, next.lat, next.lng)
                });
                current = next;
            }

            // [м¶”к°Җ] л§Ҳм§Җл§ү лҸ„м°©м§Җ(м§‘) м¶”к°Җ
            if (endNode) {
                path.push({
                    ...endNode,
                    distanceFromPrev: getDistance(current.lat, current.lng, endNode.lat, endNode.lng),
                    type: 'destination' // мӢқлі„мҡ© нғңк·ё
                });
            }

            return path;
        }

        // [м»ҙнҸ¬л„ҢнҠё] м§ҖлҸ„ (м№ҙм№ҙмҳӨ м§ҖлҸ„ API мҷ„лІҪ м—°лҸҷ лІ„м „ + л””мһҗмқё л°Ҹ мӨҢ лІ„к·ё н”ҪмҠӨ лі‘н•©)
        function MapView({ locations, center, startPoint }) { 
            const mapRef = useRef(null); 
            const mapInstance = useRef(null); 
            const markersRef = useRef([]); // л§Ҳм»Ө(м»ӨмҠӨн…Җ мҳӨлІ„л Ҳмқҙ) м ҖмһҘ

            const [mapLoaded, setMapLoaded] = useState(false);

            const locationsStr = JSON.stringify(locations || []); 
            const startStr = JSON.stringify(startPoint || null); 
            const centerStr = JSON.stringify(center || null);

            // [Fix] м№ҙм№ҙмҳӨл§ө API мҠӨнҒ¬лҰҪнҠёк°Җ л№„лҸҷкё°лЎң лЎңл“ңлҗ  л•Ңк№Ңм§Җ кё°лӢӨл ёлӢӨк°Җ л ҢлҚ”л§Ғн•ҳлҸ„лЎқ мІҳлҰ¬
            useEffect(() => {
                let checkInterval;
                
                const initMap = () => {
                    if (window.kakao && window.kakao.maps) {
                        window.kakao.maps.load(() => {
                            setMapLoaded(true);
                        });

                    }
                    return false;
                };

                // 1. мҰүмӢң нҷ•мқё
                if (!initMap()) {
                    // 2. м—Ҷмңјл©ҙ 0.1мҙҲл§ҲлӢӨ нҷ•мқё
                    checkInterval = setInterval(() => {
                        if (initMap()) {
                            clearInterval(checkInterval);
                        }
                    }, 100);
                }

                // 3. 5мҙҲ л’Өм—җлҠ” л¬ҙмЎ°кұҙ мқён„°лІҢ мў…лЈҢ (л¬ҙн•ңлЈЁн”„ л°©м§Җ)
                const timeoutId = setTimeout(() => {
                    if (checkInterval) clearInterval(checkInterval);
                }, 5000);

                return () => {
                    if (checkInterval) clearInterval(checkInterval);
                    clearTimeout(timeoutId);
                };
            }, []);
 
            useEffect(() => { 
                // [Fix] м№ҙм№ҙмҳӨ к°қмІҙк°Җ м—Ҷкұ°лӮҳ м•„м§Ғ лЎңл“ңлҗҳм§Җ м•Ҡм•ҳлӢӨл©ҙ мЎ°кё° мў…лЈҢ
                if (!window.kakao || !window.kakao.maps || !mapLoaded || !mapRef.current) return; 
                 
                // [л””лІ„к·ё] л§Ҳм»Ө мғҒнғң лЎңк·ё 
                console.log(`[Map] л ҢлҚ”л§Ғ: нҷңм„ұ л§Ҳм»Ө ${locations.length}к°ң, мӨ‘мӢ¬: ${center?.address || 'N/A'}`); 
 
                // мҙҲкё°нҷ” 
                if (!mapInstance.current) { 
                    const centerLat = (center && typeof center.lat === 'number') ? center.lat : 37.5665;
                    const centerLng = (center && typeof center.lng === 'number') ? center.lng : 126.9780;
                    
                    const options = { 
                        center: new window.kakao.maps.LatLng(centerLat, centerLng), 
                        level: 4 
                    }; 
                    mapInstance.current = new window.kakao.maps.Map(mapRef.current, options); 
                } 
 
                const map = mapInstance.current; 

                // 2. мқҙм „ л§Ҳм»Ө л°Ҹ м„  м ңкұ° (л©”лӘЁлҰ¬ кҙҖлҰ¬ л°Ҹ к№ңл№Ўмһ„ л°©м§Җ) 
                markersRef.current.forEach(overlay => overlay.setMap(null)); 
                markersRef.current = []; 
                if (polylineRef.current) polylineRef.current.setMap(null); 
 
                const bounds = new window.kakao.maps.LatLngBounds(); 
                const path = []; 
                let hasValidPoints = false; // мң нҡЁн•ң мўҢн‘ңк°Җ н•ҳлӮҳлқјлҸ„ мһҲлҠ”м§Җ мІҙнҒ¬
 
                // м „м—ӯ нҢқм—… кҙҖлҰ¬ н•ЁмҲҳ (м№ҙм№ҙмҳӨл§өмҡ©)
                if (!window.activeKakaoPopup) window.activeKakaoPopup = null;
                const closePopup = () => {

                    }
                };

                // 3. м¶ңл°ңм§Җ л§Ҳм»Ө (л¬јл°©мҡё л””мһҗмқё лі‘н•©)
                if (startPoint && !isNaN(startPoint.lat) && !isNaN(startPoint.lng)) {

                    const customOverlay = new window.kakao.maps.CustomOverlay({

                        zIndex: 3

                    // нҢқм—… мҳӨлІ„л Ҳмқҙ
                    const popupOverlay = new window.kakao.maps.CustomOverlay({

                        yAnchor: 1.0,
                        zIndex: 10
                    });

                    markerContent.onclick = () => {
                        if (window.activeKakaoPopup === popupOverlay) {
                            closePopup();
                        } else {

                            popupOverlay.setMap(map);
                            window.activeKakaoPopup = popupOverlay;
                        }
                    };

                    customOverlay.setMap(map); 
                    markersRef.current.push(customOverlay);
                    bounds.extend(startPos); 
                    path.push(startPos);

                } 
 
                // 4. л°°мҶЎм§Җ л°Ҹ лҸ„м°©м§Җ л§Ҳм»Ө (мӮ¬мҡ©мһҗ лЈЁн”„ + л””мһҗмқё лі‘н•©)
                locations.forEach((group, idx) => { 
                    // [м•Ҳм „мһҘм№ҳ] мўҢн‘ң мң нҡЁм„ұ кІҖмӮ¬

                    const pos = new window.kakao.maps.LatLng(group.lat, group.lng);

                        popupHtml = `<div class="p-2 min-w-[150px] bg-white rounded-xl shadow-lg border border-gray-200 mb-12"><div class="font-bold text-center">рҹҸ  лҸ„м°©м§Җ<br/><span class="text-xs text-gray-500">${group.address}</span></div></div>`;
                    } 
                    // [м¶ңл°ңм§Җ л§Ҳм»Ө] - лӘ…мӢңм Ғ нғҖмһ… (кё°мЎҙ locations л°°м—ҙм—җ startPointк°Җ нҸ¬н•Ёлҗҳм–ҙ л„ҳм–ҙмҳ¬ кІҪмҡ°)
                    else if (group.type === 'start') {
                        markerContent.innerHTML = `<div class="marker-pin" style="background: #2563eb;"></div><div class="marker-text" style="color: #2563eb; font-size: 13px; top: 7px; left: -1px; letter-spacing: -1px;">м¶ңл°ң</div>`;
                        popupHtml = `<div class="p-2 min-w-[150px] bg-white rounded-xl shadow-lg border border-gray-200 mb-12"><div class="font-bold text-center">рҹҡ© м¶ңл°ңм§Җ<br/><span class="text-xs text-gray-500">${group.address}</span></div></div>`;
                    } 
                    else {

                        const deliveryOnlyIdx = locations.filter(l => !l.type).indexOf(group) + 1;

                                    <span style="background:#d9534f;color:white;font-size:11px;font-weight:800;padding:2px 7px;border-radius:20px;">${seqNum}лІҲ</span>
                                    <span style="font-size:12px;font-weight:700;color:#1f2937;">${group.phone || ''}</span>
                                </div>
                                <div style="font-size:11px;color:#374151;margin-bottom:8px;line-height:1.4;">рҹ“Қ ${(group.address || 'мЈјмҶҢ м—ҶмқҢ').substring(0,28)}${(group.address||'').length>28?'вҖҰ':''}</div>
                                <div style="display:flex;gap:4px;">
                                    <button onclick="window.handleAppNavigation(${group.lat},${group.lng},'${(group.address||'').replace(/'/g,"\'")}')" style="flex:1;background:#d9534f;color:white;font-size:11px;font-weight:700;padding:5px 0;border:none;border-radius:6px;cursor:pointer;">л°°мҶЎм¶ңл°ң</button>
                                    <button onclick="window.handlePopupSequenceChange('${(group.ids&&Array.isArray(group.ids)?group.ids:[]).join(',')}')" style="flex:1;background:#5bc0de;color:white;font-size:11px;font-weight:700;padding:5px 0;border:none;border-radius:6px;cursor:pointer;">мҲңм„ңліҖкІҪ</button>
                                    <button onclick="window.closeKakaoPopup()" style="flex:1;background:#e2e8f0;color:#475569;font-size:11px;font-weight:700;padding:5px 0;border:none;border-radius:6px;cursor:pointer;">лӢ«кё°</button>
                                </div>

                        `;

                    const customOverlay = new window.kakao.maps.CustomOverlay({

                    markerContent.onclick = () => {
                        if (window.activeKakaoPopup === popupOverlay) {
                            closePopup();
                        } else {
                            closePopup();
                            popupOverlay.setMap(map);
                            window.activeKakaoPopup = popupOverlay;
                        }
                    };
 
                    customOverlay.setMap(map); 
                    markersRef.current.push(customOverlay); 
                }); 
 
                // 5. кІҪлЎң м„  к·ёлҰ¬кё° (мӮ¬мҡ©мһҗ м ңкіө мҪ”л“ң кё°л°ҳ)
                if (path.length >= 2) { 
                    polylineRef.current = new window.kakao.maps.Polyline({ 
                        path: path, 
                        strokeWeight: 4, 
                        strokeColor: '#2563eb', 
                        strokeOpacity: 0.7,

                    polylineRef.current.setMap(map); 
                } 
 
                // 6. м§ҖлҸ„ мӨ‘мӢ¬/мӨҢ м„Өм • - л°°мҶЎм§Җ кё°мӨҖ (м¶ңл°ңм§Җк°Җ л©Җм–ҙлҸ„ л°°мҶЎм§Җ мӨ‘мӢ¬)
                if (hasValidPoints) {
                    const deliveryOnly = locations.filter(l => !l.type && l.lat && l.lng && !isNaN(l.lat));
                    const firstDelivery = deliveryOnly.find(l => l.sequence_number === 1);

                    if (deliveryOnly.length >= 2) {

                        // 1лІҲ л§Ҳм»Өк°Җ мһҲмңјл©ҙ мӨ‘мӢ¬мңјлЎң мқҙлҸҷ
                        if (firstDelivery) {

                        map.setCenter(new window.kakao.maps.LatLng(deliveryOnly[0].lat, deliveryOnly[0].lng));
                        map.setLevel(4);
                    } else {
                        map.setBounds(bounds, 50, 50, 50, 50);
                    }
                }
 
            }, [locationsStr, startStr, centerStr, mapLoaded]); 
 
            return ( 
                <div  
                    ref={mapRef}  
                    className="map-container mb-4 shadow-inner rounded-xl" 
                    style={{ height: '400px', width: '100%', backgroundColor: '#eee', zIndex: 1, position: 'relative' }} 
                >
                    {!mapLoaded && (
                        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', color: '#666' }}>
                            м§ҖлҸ„лҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨ...
                        </div>
                    )}
                </div> 
            ); 
        }

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught an error", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-red-50">
                            <div className="text-6xl mb-4">рҹҳө</div>

                            <div className="flex flex-col gap-3 w-full max-w-xs">

        // [л©”мқё м•ұ]
        function BarcodeScannerEffect({ isActive, deliveries, scannedItems, setScannedItems }) {
            const lastRef = React.useRef('');
            const streamRef = React.useRef(null);
            const rafRef = React.useRef(null);

            React.useEffect(() => {
                if (!isActive) return;
                const video = document.getElementById('barcode-video');
                if (!video) return;

                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                    .then(stream => {
                        streamRef.current = stream;
                        video.srcObject = stream;
                        video.play();
                        const scan = () => {
                            if (video.readyState === video.HAVE_ENOUGH_DATA && window.jsQR) {
                                const c = document.createElement('canvas');
                                c.width = video.videoWidth; c.height = video.videoHeight;
                                c.getContext('2d').drawImage(video, 0, 0);
                                const img = c.getContext('2d').getImageData(0, 0, c.width, c.height);
                                const code = window.jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
                                if (code && code.data && code.data !== lastRef.current) {
                                    const num = code.data.trim();
                                    lastRef.current = num;
                                    const matched = deliveries.find(d => String(d.invoice_number || '').trim() === num);
                                    const toast = document.createElement('div');
                                    if (matched) {
                                        if (!scannedItems.includes(num)) setScannedItems(prev => [...prev, num]);
                                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                                        toast.textContent = `вң… ${matched.address ? matched.address.slice(0,15) : num}`;
                                        toast.style.cssText = 'position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#22c55e;color:white;font-weight:800;padding:12px 20px;border-radius:12px;z-index:9999;font-size:15px;';
                                    } else {
                                        if (navigator.vibrate) navigator.vibrate([200,100,200]);
                                        toast.textContent = `вҡ пёҸ лҜёл“ұлЎқ: ${num.slice(0,15)}`;
                                        toast.style.cssText = 'position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#ef4444;color:white;font-weight:800;padding:12px 20px;border-radius:12px;z-index:9999;font-size:15px;';
                                    }
                                    document.body.appendChild(toast);
                                    setTimeout(() => { if(document.body.contains(toast)) document.body.removeChild(toast); lastRef.current = ''; }, 1500);
                                }
                            }
                            rafRef.current = requestAnimationFrame(scan);
                        };
                        rafRef.current = requestAnimationFrame(scan);
                    })
                    .catch(() => alert('м№ҙл©”лқј м ‘к·ј к¶Ңн•ңмқҙ н•„мҡ”н•©лӢҲлӢӨ.'));

                return () => {
                    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                };
            }, [isActive]);
            return null;
        }

                // baseItem мһҗлҰ¬м—җ mergedItemмқ„ л„Јкі , лӮҳлЁём§Җ targetsлҠ” м ңкұ°
                const otherIds = selectedMergeIds.filter(id => id !== baseItem.id);
                const newDeliveries = deliveries.map(d => {

            // [New] л°°мҶЎ кұҙ л¶„лҰ¬н•ҳкё° (Undo Merge)
            const handleSplitDelivery = (mergedId) => {
                if(!confirm("н•©міҗм§„ л°°мҶЎ кұҙмқ„ лӢӨмӢң л¶„лҰ¬н•ҳмӢңкІ мҠөлӢҲк№Ң?")) return;
                
                pushHistory(deliveries); // Undo м ҖмһҘ

                const target = deliveries.find(d => d.id === mergedId);

                // Case 1: мӣҗліё лҚ°мқҙн„°к°Җ мһҲлҠ” кІҪмҡ° (мҷ„лІҪ ліөмӣҗ)

                    const originals = target._mergedOriginals;

                    setToastMsg("вҷ»пёҸ л°°мҶЎ кұҙмқҙ мӣҗлһҳлҢҖлЎң ліөкө¬лҗҳм—ҲмҠөлӢҲлӢӨ.");

                // Case 2: мӣҗліё лҚ°мқҙн„°к°Җ м—ҶлҠ” кІҪмҡ° (detail_items кё°л°ҳ мһ¬мғқм„ұ - л Ҳкұ°мӢң м§Җмӣҗ)

                        yangjung: dt.yangjung || 0,
                        naerim: dt.naerim || 0,

                        _mergedOriginals: null // лі‘н•© м •ліҙ м ңкұ°
                    }));

                    const targetIndex = deliveries.findIndex(d => d.id === mergedId);
                    const newDeliveries = [...deliveries];
                    newDeliveries.splice(targetIndex, 1, ...newItems);
                    setDeliveries(newDeliveries);

                    setToastMsg("вҷ»пёҸ л°°мҶЎ кұҙмқҙ к°ңлі„ н•ӯлӘ©мңјлЎң л¶„лҰ¬лҗҳм—ҲмҠөлӢҲлӢӨ.");
                } else {
                    alert("л¶„лҰ¬н•  мғҒм„ё н’ҲлӘ© м •ліҙк°Җ м—ҶмҠөлӢҲлӢӨ.");
                }
            };

            // [Function] Undo
            const handleUndo = () => {
                if (history.length === 0) return;

            // [Function] м „нҷ”лІҲнҳё мҲҳм •

            // [New] кё°мӮ¬ мқҙлҸҷ мІҳлҰ¬ н•ЁмҲҳ
            const handleMoveDriverConfirm = () => {
                if (!moveDriverTarget) {

                const updated = deliveries.map(d => {

                setDeliveries(updated);

                setMoveDriverModal({ isOpen: false, targetIds: [], currentDriver: '' });
                setToastMsg(`рҹҡҡ ${moveDriverTarget} кё°мӮ¬лӢҳм—җкІҢ л°°мҶЎ кұҙмқ„ м „лӢ¬н–ҲмҠөлӢҲлӢӨ.`);
            };

            // [Function] мҲңм„ң ліҖкІҪ (Reorder)
            const handleSequenceChange = (targetIds, newSeqStr) => {
                const newSeq = parseInt(newSeqStr);
                if (isNaN(newSeq) || newSeq < 1) return;

                pushHistory(deliveries); // Save state

                // нғҖкІҹ м•„мқҙн…ңл“Өмқҳ нҳ„мһ¬ мҲңм„ң м°ҫкё° (мІ« лІҲм§ё м•„мқҙн…ң кё°мӨҖ)
                const targetItem = deliveries.find(d => targetIds.includes(d.id));
                if (!targetItem) return;
                const oldSeq = targetItem.sequence_number;

                if (oldSeq === newSeq) return;

                const newDeliveries = deliveries.map(d => {
                    // нғҖкІҹ к·ёлЈ№мқё кІҪмҡ° мғҲ мҲңм„ң л¶Җм—¬
                    if (targetIds.includes(d.id)) {
                        return { ...d, sequence_number: newSeq };
                    }
                    // мҳҒн–Ҙ л°ӣлҠ” лӢӨлҘё м•„мқҙн…ңл“Ө мҲңм„ң л°Җкё°/лӢ№кё°кё°
                    // Case 1: м•„лһҳлЎң мқҙлҸҷ (мҳҲ: 1 -> 3) => 2, 3лІҲмқҙ 1, 2лІҲмңјлЎң лӢ№кІЁм§җ (-1)
                    if (oldSeq < newSeq) {
                        if (d.sequence_number > oldSeq && d.sequence_number <= newSeq) {
                            return { ...d, sequence_number: d.sequence_number - 1 };
                        }
                    }
                    // Case 2: мң„лЎң мқҙлҸҷ (мҳҲ: 3 -> 1) => 1, 2лІҲмқҙ 2, 3лІҲмңјлЎң л°ҖлҰј (+1)
                    else {
                        if (d.sequence_number >= newSeq && d.sequence_number < oldSeq) {
                            return { ...d, sequence_number: d.sequence_number + 1 };
                        }
                    }
                    return d;
                });
                
                // м •л ¬ л°Ҹ м ҖмһҘ
                newDeliveries.sort((a, b) => a.sequence_number - b.sequence_number);

            async function downloadCustomerExcel(targetDate = null) {
