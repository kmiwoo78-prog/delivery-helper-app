                // мқјлі„мқҙл©ҙ н•ҙлӢ№ лӮ м§ң, мӣ”лі„мқҙл©ҙ н•ҙлӢ№ мӣ” м „мІҙ
                const filtered = targetDate
                    ? deliveries.filter(d => String(d.date || '') === targetDate)
                    : deliveries.filter(d => String(d.date || '').startsWith(targetMonth));

                if (filtered.length === 0) {
                    alert(targetDate ? `${targetDate} лӮ м§ңм—җ лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.` : "м„ нғқн•ң мӣ”м—җ л°°лӢ¬ лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.");
                    return;
                }

                try {
                    const workbook = new ExcelJS.Workbook();
                    const sheetName = targetDate ? `л°°мҶЎнҳ„нҷ©_${targetDate}` : 'л°°мҶЎнҳ„нҷ©';
                    const sheet = workbook.addWorksheet(sheetName);

                    sheet.columns = [
                        { header: 'мғҒнғң', key: 'status', width: 8 },
                        { header: 'л°°мҶЎмқј', key: 'date', width: 13 },
                        { header: 'мЈјл¬ёлІҲнҳё', key: 'order_number', width: 14 },
                        { header: 'мҶЎмһҘлІҲнҳё', key: 'invoice_number', width: 14 },
                        { header: 'кі к°қлӘ…(мғҒн’ҲлӘ…)', key: 'item', width: 30 },
                        { header: 'м „нҷ”лІҲнҳё', key: 'phone', width: 14 },
                        { header: 'мЈјмҶҢ', key: 'address', width: 40 },
                        { header: 'мҳҲм•ҪмӢңк°„', key: 'time', width: 10 },
                        { header: 'лӢҙлӢ№кё°мӮ¬', key: 'driver', width: 10 },
                        { header: 'кё°мӮ¬ліҖкІҪ', key: 'driver_memo', width: 20 },
                        { header: 'м„Өм№ҳл№„', key: 'install_fee', width: 12 },
                        { header: 'м–‘мӨ‘л№„', key: 'yangjung', width: 12 },
                        { header: 'лӮҙлҰјл№„', key: 'naerim', width: 12 },
                        { header: 'кё°нғҖл№„мҡ©', key: 'etc_fee', width: 12 },
                        { header: 'л©”лӘЁ', key: 'memo', width: 30 },
                    ];

                    sheet.getRow(1).font = { bold: true };
                    sheet.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD9D9D9' } };

                    filtered.forEach(d => {
                        let status = 'лҢҖкё°';
                        if (d.completed) status = 'мҷ„лЈҢ';
                        else if (d.partial) status = 'л¶Җл¶„';
                        else if (d.canceled) status = d.cancel_type === 'postpone' ? 'м—°кё°' : 'м·ЁмҶҢ';

                        // м—°кё°/м·ЁмҶҢлҠ” м„Өм№ҳл№„ 0мӣҗ
                        const isCanceled = d.canceled;
                        const installFee = isCanceled ? 0 : (Number(d.install_fee) || 0);
                        const yangjung  = isCanceled ? 0 : (Number(d.yangjung)   || 0);
                        const naerim    = isCanceled ? 0 : (Number(d.naerim)     || 0);
                        const etcFee    = isCanceled ? 0 : (Number(d.etc_fee)    || 0);

                        // кё°мӮ¬ліҖкІҪ мқҙл Ҙ м¶”м¶ң (л©”лӘЁм—җм„ң [кё°мӮ¬ліҖкІҪ...] л¶Җл¶„)
                        const driverMemo = (d.memo || '').match(/\[кё°мӮ¬ліҖкІҪ[^\]]*\]/g)?.join(' ') || '';
                        const cleanMemo  = (d.memo || '').replace(/\[кё°мӮ¬ліҖкІҪ[^\]]*\]\s*\/?/g, '').trim();

                        const row = sheet.addRow({
                            status,
                            date: d.date,
                            order_number:   Number(d.order_number) || d.order_number || '',
                            invoice_number: String(d.invoice_number || ''),
                            item:    d.item    || '',
                            phone:   d.phone   || '',
                            address: d.address || '',
                            time:    d.time    || '',
                            driver:  d.driver  || '',
                            driver_memo: driverMemo,
                            install_fee: installFee,
                            yangjung,
                            naerim,
                            etc_fee: etcFee,
                            memo: cleanMemo
                        });

                        // мЈјл¬ёлІҲнҳё(Cн–ү) мҲ«мһҗ нҸ¬л§·
                        const orderCell = row.getCell('order_number');
                        if (!isNaN(Number(d.order_number)) && d.order_number) {
                            orderCell.value = Number(d.order_number);
                            orderCell.numFmt = '0';
                        }

                        // м—°кё°/м·ЁмҶҢ н–ү нҡҢмғүмңјлЎң н‘ңмӢң
                        if (isCanceled) {
                            row.eachCell(cell => {
                                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE0E0E0' } };
                            });
                        }
                    });

                    // мҲ«мһҗ м»¬лҹј нҸ¬л§·
                    ['install_fee', 'yangjung', 'naerim', 'etc_fee'].forEach(key => {
                        sheet.getColumn(key).numFmt = '#,##0';
                    });

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = targetDate
                        ? `л°°мҶЎнҳ„нҷ©_${targetDate}.xlsx`
                        : `л°°мҶЎнҳ„нҷ©_${targetMonth.replace('-', '')}.xlsx`;
                    a.click();
                } catch(e) {
                    console.error(e);
                    alert("м—‘м…Җ лӢӨмҡҙлЎңл“ң мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.");
                }
            }

            // [New] кё°мӮ¬лі„ лҸ„м°©м§Җ(EndPoint) лЎңл“ң
            useEffect(() => {
                if (view === 'driver' && currentUser) {
                    const key = `mvp_end_point_${currentUser}`;
                    let end = StorageManager.get(key);
                    
                    if (end && end.type !== 'destination') {
                        end = { ...end, type: 'destination' };
                    }
                    setEndPoint(end || null);
                }
            }, [currentUser, view]);

            // [New] кё°мӮ¬ лӘЁл“ң м§„мһ… мӢң лҸ„м°©м§Җ лҜём„Өм • м•ҢлҰј (мӮӯм ңлҗЁ - мӮ¬мҡ©мһҗ мҡ”мІӯ)
            /*
            useEffect(() => {
                // [Fix] лЎңк·ёмқё мғҒнғң(isLoggedIn)мқј л•Ңл§Ң м•ҢлҰј н‘ңмӢң
                if (isLoggedIn && view === 'driver' && !loading && !endPoint && !fatalError) {
                    const timer = setTimeout(() => {
                        // мӨ‘ліө мӢӨн–ү л°©м§ҖлҘј мң„н•ҙ нҷ•мқё
                        const key = currentUser ? `mvp_end_point_${currentUser}` : 'mvp_end_point';
                        const currentEnd = StorageManager.get(key);
                        if (!currentEnd) {
                            if(confirm("лҸ„м°©м§Җ(нҷҲ)к°Җ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.\nнҮҙк·ј кІҪлЎң мөңм Ғнҷ”лҘј мң„н•ҙ лҸ„м°©м§ҖлҘј м„Өм •н•ҳмӢңкІ мҠөлӢҲк№Ң?")) {
                                handleUpdateEndPoint();
                            }
                        }
                    }, 1500); // 1.5мҙҲ л”ңл Ҳмқҙ
                    return () => clearTimeout(timer);
                }
            }, [view, loading, endPoint, currentUser, isLoggedIn]);
            */

            // нҶ мҠӨнҠё л©”мӢңм§Җ мһҗлҸҷ мҲЁк№Җ
            useEffect(() => {
                if (toastMsg) {
                    const timer = setTimeout(() => setToastMsg(''), 3000);
                    return () => clearTimeout(timer);
                }
            }, [toastMsg]);

            

            
            // [Auto Save] м¶ңл°ңм§Җ/лҸ„м°©м§Җ ліҖкІҪ мӢң мһҗлҸҷ м ҖмһҘ лЎңм§Ғ м¶”к°Җ
            useEffect(() => {
                if (!loading && window.__isAppReady) {
                    // startPointлӮҳ endPointк°Җ ліҖкІҪлҗ  л•Ңл§ҲлӢӨ м „мІҙ лҚ°мқҙн„° нҶөн•© м ҖмһҘ
                    StorageManager.saveAllData(deliveries, startPoint, endPoint);
                }
            }, [startPoint, endPoint]);

            // [Auto Save] deliveries ліҖкІҪ мӢң лЎңм»¬ мҠӨнҶ лҰ¬м§Җ м ҖмһҘ л°Ҹ м„ңлІ„ лҸҷкё°нҷ”
            useEffect(() => {
                // [Fix] мҙҲкё° л ҢлҚ”л§Ғ мӢң л№Ҳ л°°м—ҙлЎң лҚ®м–ҙм”ҢмӣҢм§ҖлҠ” нҳ„мғҒ мҷ„лІҪ л°©м§Җ
                
                // 1. м•ұ лЎңл”© мӨ‘мқҙкұ°лӮҳ мөңмҙҲ лҚ°мқҙн„° лЎңл“ңк°Җ лҒқлӮҳм§Җ м•Ҡм•ҳмңјл©ҙ л¬ҙмЎ°кұҙ м ҖмһҘ м°ЁлӢЁ
                if (loading) {
                    console.log('[AutoSave] Blocked save during data loading');
                    return;
                }

                // 2. мҙҲкё° л§ҲмҡҙнҠё м§Ғнӣ„мқҳ л№„м •мғҒм Ғмқё л№Ҳ л°°м—ҙ м ҖмһҘ л°©м§Җ
                // React 18 StrictMode м—җм„ңлҠ” л§ҲмҡҙнҠёк°Җ 2лІҲ мқјм–ҙлӮЁ
                if (!window.__isAppReady) {
                    console.log('[AutoSave] Blocked save before app is fully ready');
                    return;
                }

                // лЎңм»¬ мҠӨнҶ лҰ¬м§Җм—җ лҚ°мқҙн„°к°Җ мһҲлҠ”м§Җ нҷ•мқё
                const rawLocalData = localStorage.getItem('deliveryData') || localStorage.getItem(Config.STORAGE_KEYS.DELIVERIES);
                const hasLocalData = rawLocalData && rawLocalData !== '[]' && rawLocalData !== '{}';

                // 3. state(deliveries)лҠ” л№„м–ҙмһҲлҠ”лҚ° лЎңм»¬мҠӨнҶ лҰ¬м§Җм—җлҠ” лҚ°мқҙн„°к°Җ мһҲлӢӨл©ҙ?
                // -> м•„м§Ғ лЎңм»¬ лҚ°мқҙн„°лҘј stateм—җ лӢӨ мҳ®кІЁлӢҙм§Җ лӘ»н•ң 'л ҢлҚ”л§Ғ нғҖмқҙл°Қ м°Ёмқҙ'мқј нҷ•лҘ мқҙ лҶ’мқҢ (лҚ®м–ҙм“°кё° л°©м§Җ)
                if (deliveries.length === 0 && !isRemoteUpdate.current && hasLocalData) {
                    console.log('[AutoSave] Blocked empty array overwrite (Local data exists)');
                    return; 
                }
                
                // м„ңлІ„м—җм„ң к°Җм ёмҳЁ лҚ°мқҙн„°лҘј м„ёнҢ…н•ҳлҠ” мӨ‘мқҙлқјл©ҙ, лЎңм»¬м—җл§Ң мӮҙм§қ м—…лҚ°мқҙнҠён•ҳкі  м„ңлІ„ м „мҶЎмқҖ мҠӨнӮө
                if (isRemoteUpdate.current) {
                    console.log('[AutoSave] Skipped cloud push due to remote update');
                    StorageManager.saveAllData(deliveries, startPoint, endPoint);
                    isRemoteUpdate.current = false;
                    return;
                }

                // 4. м •мғҒм Ғмқё м ҖмһҘ лЎңм§Ғ
                if (deliveries.length > 0) {
                    // лҚ°мқҙн„°к°Җ 1к°ң мқҙмғҒ мһҲмңјл©ҙ л¬ҙмЎ°кұҙ м ҖмһҘ
                    StorageManager.saveAllData(deliveries, startPoint, endPoint);
                } else if (deliveries.length === 0 && !hasLocalData) {
                    // мҷ„м „нһҲ мғҲлЎңмҡҙ л№Ҳ мғҒнғңмқҙкұ°лӮҳ мӮ¬мҡ©мһҗк°Җ 'м „мІҙ мӮӯм ң'лҘј лҲҢлҹ¬ лЎңм»¬лҸ„ л№„мӣҢм§„ мғҒнғңмқј л•Ңл§Ң л№Ҳ л°°м—ҙ м ҖмһҘ
                    StorageManager.saveAllData([], startPoint, endPoint);
                }
            }, [deliveries]);

            // [Auto Geocode] мўҢн‘ңк°Җ м—ҶлҠ” лҚ°мқҙн„° мһҗлҸҷ ліҖнҷҳ
            useEffect(() => {
                if (deliveries && deliveries.length > 0) {
                    const pending = deliveries.filter(d => {
                        const lat = Number(d.lat);
                        const lng = Number(d.lng);
                        const noCoord = isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0;
                        const isFallback = !noCoord && isFallbackCoord(lat, lng);
                        return (noCoord || isFallback) && d.address;
                    });
                    if (pending.length > 0) {
                        console.log(`[AutoGeocode] Found ${pending.length} missing coords. Running background geocode...`);
                        // [Fix] м№ҙм№ҙмҳӨл§ө лЎңл“ң мҷ„лЈҢ нӣ„ мӢӨн–ү
                        const tryGeocode = (attempt = 0) => {
                            if (window.kakao && window.kakao.maps && window.kakao.maps.services) {
                                backgroundGeocode(deliveries);
                            } else if (attempt < 20) {
                                console.log(`[AutoGeocode] м№ҙм№ҙмҳӨл§ө лҢҖкё° мӨ‘... (${attempt+1})`);
                                setTimeout(() => tryGeocode(attempt + 1), 500);
                            } else {
                                console.error('[AutoGeocode] м№ҙм№ҙмҳӨл§ө лЎңл“ң мӢӨнҢЁ');
                            }
                        };
                        tryGeocode();
                    }
                }
            }, [deliveries]);

            // [New] Realtime Subscription (Server -> Client)
            useEffect(() => {
                let channel = null;
                let pollTimer = null;

                const fetchLatest = async () => {
                    if (CloudManager.isConnected) {
                        try {
                            const cloudData = await CloudManager.pull();
                            if (cloudData && Array.isArray(cloudData)) {
                                setDeliveries(prev => {
                                    const currentStr = JSON.stringify(prev);
                                    const serverStr = JSON.stringify(cloudData);
                                    if (currentStr !== serverStr) {
                                        console.log('[Poll] Syncing from server...');
                                        isRemoteUpdate.current = true;
                                        return cloudData;
                                    }
                                    return prev;
                                });
                            }
                        } catch (e) {
                            console.warn('[Poll] Failed to fetch latest data', e);
                        }
                    }
                };

                const initAndSubscribe = () => {
                    // Ensure connection
                    if (!CloudManager.isConnected) {
                        CloudManager.init(Config.SUPABASE_URL, Config.SUPABASE_KEY);
                    }
                    
                    if (CloudManager.isConnected && CloudManager.client) {
                        console.log('[Realtime] Subscribing to delivery_sync...');
                        
                        // мҙҲкё° лҚ°мқҙн„° лЎңл“ң к°•м ң мӢӨн–ү
                        fetchLatest();
                        
                        channel = CloudManager.client
                            .channel('public:delivery_sync')
                            .on('postgres_changes', 
                                { event: '*', schema: 'public', table: 'delivery_sync' }, 
                                (payload) => {
                                    if (payload.new && payload.new.id === 'master') {
                                        const serverData = payload.new.data;
                                        if (Array.isArray(serverData)) {
                                            setDeliveries(prev => {
                                                const currentStr = JSON.stringify(prev);
                                                const serverStr = JSON.stringify(serverData);
                                                if (currentStr !== serverStr) {
                                                    console.log('[Realtime] Syncing from server...');
                                                    isRemoteUpdate.current = true;
                                                    setToastMsg("вҳҒпёҸ мӢӨмӢңк°„ лҸҷкё°нҷ”лҗЁ");
                                                    return serverData;
                                                }
                                                return prev;
                                            });
                                        }
                                    }
                                }
                            )
                            .subscribe();
                            
                        // [м•Ҳм „л§қ] Realtime мң мӢӨ лҢҖл№„ 15мҙҲл§ҲлӢӨ к°•м ң лҸҷкё°нҷ”
                        pollTimer = setInterval(fetchLatest, 60000); // [Fix] 15мҙҲвҶ’60мҙҲ: Supabase л¶Җн•ҳ к°җмҶҢ
                    }
                };

                initAndSubscribe();

                return () => {
                    if (channel && CloudManager.client) CloudManager.client.removeChannel(channel);
                    if (pollTimer) clearInterval(pollTimer);
                };
            }, []);
            
            // [Helper] Local Date String (KST Support)
            const getLocalDateString = () => {
                const d = new Date();
                const offset = d.getTimezoneOffset() * 60000;
                return new Date(d.getTime() - offset).toISOString().split('T')[0];
            };

            // мғҒнғң: м¶ңл°ңм§Җ, лҸ„м°©м§Җ, лӮ м§ң
            const [startPoint, setStartPoint] = useState(null); // { lat, lng, address }
            const [endPoint, setEndPoint] = useState(null); // { lat, lng, address }
            const [targetDate, setTargetDate] = useState(parseCustomDate(null));

            // мһ…л Ҙ нҸј
            const [form, setForm] = useState({ 
                date: getLocalDateString(), 
                item: '', 
                phone: '', 
                address: '', 
                install_fee: 0,
                yangjung: 0,
                naerim: 0,
                etc_fee: 0,
                reservationDate: '',
                reservationTime: '',
                isInstallNeeded: false,
                installTime: '',
                memo: ''
            });

            // [Expansion 3] мӢӨмӢңк°„ мң„м№ҳ м¶”м Ғ лЎңм§Ғ (Always On in Background)
            useEffect(() => {
                let watchId;
                // Driver лӘЁл“ңмқј л•Ң н•ӯмғҒ мһ‘лҸҷ (MVP: isTracking мғҒнғң мқҳмЎҙм„ұ м ңкұ° л°Ҹ кё°ліё нҷңм„ұнҷ”)
                if (view === 'driver') {
                    watchId = navigator.geolocation.watchPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            // console.log(`[Tracking] Location Update: ${latitude}, ${longitude}`); // Log noise reduction
                            // л°ұм—”л“ң м „мҶЎ мӢңл®¬л Ҳмқҙм…ҳ
                        },
                        (error) => console.error(error),
                        { enableHighAccuracy: true }
                    );
                }
                return () => { if(watchId) navigator.geolocation.clearWatch(watchId); };
            }, [view]);

            // [Initial Data Load] Unified & Safe
            useEffect(() => {
                async function loadData() {
                    try {
                        console.log("рҹҡҖ Initializing Data...");
                        
                        // 1. Load Deliveries
                        let data = StorageManager.loadDeliveries();
                        
                        // [New] Server Sync (Mobile Support) - PCм—җм„ң м—…лЎңл“ңн•ң лҚ°мқҙн„° к°Җм ёмҳӨкё°
                        try {
                            const serverData = await StorageManager.syncFromServer();
                            if (serverData && Array.isArray(serverData) && serverData.length > 0) {
                                console.log(`[Sync] Server data applied: ${serverData.length} items`);
                                data = serverData;
                            }
                        } catch (err) {
                            console.warn("[Sync] Server sync skipped", err);
                        }

                        // [New] Supabase Sync (Cross-Network Support) - лӢӨлҘё мҷҖмқҙнҢҢмқҙ кё°мӮ¬ м§Җмӣҗ
                        if (CloudManager.isConnected) {
                            try {
                                const cloudData = await CloudManager.pull();
                                if (cloudData && Array.isArray(cloudData) && cloudData.length > 0) {
                                    console.log(`[Sync] Supabase data applied: ${cloudData.length} items`);
                                    data = cloudData; // Cloud data overrides local server data (assumed fresher/more accessible)
                                }
                            } catch (err) {
                                console.warn("[Sync] Supabase sync failed", err);
                            }
                        }
                        
                        // [м•Ҳм „мһҘм№ҳ] лҚ°мқҙн„° м •к·ңнҷ” (лӮ м§ң н•„л“ң л¬ёмһҗм—ҙ ліҙмһҘ)
                        if (Array.isArray(data)) {
                            data = data.map(d => ({
                                ...d,
                                date: typeof d.date === 'string' ? d.date : String(d.date || getLocalDateString())
                            }));
                        }

                        // [Cloud] нҒҙлқјмҡ°л“ң м—°кІ° мӢң мһҗлҸҷ лҸҷкё°нҷ” (мҳөм…ҳ) - нҳ„мһ¬лҠ” мҲҳлҸҷ лҸҷкё°нҷ” к¶ҢмһҘ
                        setDeliveries(Array.isArray(data) ? data : []);

                        // [Smart Date] лҚ°мқҙн„°к°Җ мһҲлҠ” мөңмӢ  лӮ м§ңлЎң мһҗлҸҷ мқҙлҸҷ
                        if (Array.isArray(data) && data.length > 0) {
                            // [Fix] кё°мӮ¬ лӘЁл“ңмқё кІҪмҡ°, ліёмқём—җкІҢ л°°м •лҗң лҚ°мқҙн„°к°Җ мһҲлҠ” лӮ м§ң мҡ°м„ 
                            let relevantData = data;
                            const savedDriver = localStorage.getItem('delivery_app_session_driver'); // Closure safe
                            if (savedDriver && savedDriver !== 'admin') {
                                const myData = data.filter(d => d.driver === savedDriver);
                                if (myData.length > 0) relevantData = myData;
                            }

                            const availableDates = [...new Set(relevantData.map(d => d.date))].sort().reverse();
                            const today = getLocalDateString();
                            
                            // [Smart Date V2] лҚ°мқҙн„° мһҗлҸҷ мқҙлҸҷ лЎңм§Ғ к°ңм„ 
                            // 1. мҳӨлҠҳ лӮ м§ңм—җ (лӮҳмқҳ) лҚ°мқҙн„°к°Җ мһҲмңјл©ҙ мң м§Җ (мҡ°м„ мҲңмң„ 1)
                            if (availableDates.includes(today)) {
                                // Stay on today
                                setForm(prev => ({ ...prev, date: today }));
                            } else if (availableDates.length > 0) {
                                // 2. мҳӨлҠҳ лҚ°мқҙн„°к°Җ м—Ҷмңјл©ҙ, к°ҖмһҘ мөңмӢ  лҚ°мқҙн„° лӮ м§ңлЎң мқҙлҸҷ (кіјкұ° кё°лЎқ нҷ•мқё)
                                // мӮ¬мҡ©мһҗ мҡ”мІӯ: лҜёмҷ„лЈҢ м—…л¬ҙ мҡ°м„  н‘ңмӢң лЎңм§Ғ м ңкұ° -> лӢЁмҲң мөңмӢ  лӮ м§ң мқҙлҸҷ
                                console.log(`[Smart Date] Auto-switching to ${availableDates[0]} (Latest data)`);
                                setForm(prev => ({ ...prev, date: availableDates[0] }));
                            }
                        }

                        // 2. Load Start Point & End Point
                        const unifiedData = StorageManager.get('deliveryData');

                        let start = null;
                        let end = null;

                        // [Fix] м¶ңл°ңм§ҖлҠ” н•ӯмғҒ mvp_start_point мҡ°м„  (кҙҖлҰ¬мһҗ м„Өм •к°’ ліҙмЎҙ)
                        // unifiedData.start_locationмқҖ л°°мҶЎлҚ°мқҙн„°м—җ л¬¶мқё кіјкұ°к°’мқҙлқј лҚ®м–ҙм“°м§Җ м•ҠмқҢ
                        const startStr = localStorage.getItem('mvp_start_point');
                        if (startStr && startStr !== "undefined") {
                            try { start = JSON.parse(startStr); } catch(e) {}
                        }
                        if (!start && unifiedData && unifiedData.start_location) {
                            start = unifiedData.start_location;
                        }

                        if (unifiedData && unifiedData.destination) end = unifiedData.destination;
                        
                        const sessionDriver = localStorage.getItem('delivery_app_session_driver');
                        const endKey = sessionDriver ? `mvp_end_point_${sessionDriver}` : 'mvp_end_point';
                        if (!end) {
                            const endStr = localStorage.getItem(Config.STORAGE_KEYS.END_LOCATION) || localStorage.getItem(endKey);
                            if (endStr && endStr !== "undefined") {
                                try { end = JSON.parse(endStr); } catch(e) {}
                            }
                        }

                        // л‘ҳ лӢӨ м—Ҷмңјл©ҙ кё°ліёк°’ м„ёнҢ… м•Ҳ н•Ё (кё°мӮ¬к°Җ м§Ғм ‘ мһ…л Ҙн•ҳлҸ„лЎқ л№„мӣҢл‘ )
                        
                        // [Safety] кё°мЎҙ лҚ°мқҙн„°м—җ typeмқҙ м—ҶлҠ” кІҪмҡ° ліҙм •
                        if (end && end.type !== 'destination') {
                            end = { ...end, type: 'destination' };
                        }
                        
                        setStartPoint(start);
                        setEndPoint(end);
                        
                        // 4. Load Notice
                        const savedNotice = StorageManager.get('mvp_notice', '');
                        setNotice(savedNotice);
                        
                        console.log("вң… Initialization Complete - Refactored & Verified");

                    } catch (e) {
                        console.error("Critical Data Loading Error", e);
                        setFatalError({ message: e.message || "Failed to load application data." });
                    }
                }
                loadData();
            }, []);

            // [New] Driver Change Mode State
            const [isDriverChangeMode, setIsDriverChangeMode] = useState(false);
            const [selectedDriverChangeIds, setSelectedDriverChangeIds] = useState(new Set());

            const toggleDriverSelection = (ids) => {
                const newSet = new Set(selectedDriverChangeIds);
                const allSelected = ids.every(id => newSet.has(id));
                
                if (allSelected) {
                    ids.forEach(id => newSet.delete(id));
                } else {
                    ids.forEach(id => newSet.add(id));
                }
                setSelectedDriverChangeIds(newSet);
            };

            const handleBatchDriverChange = () => {
                 if (selectedDriverChangeIds.size === 0) {
                    alert('кё°мӮ¬лҘј ліҖкІҪн•  л°°мҶЎ кұҙмқ„ м„ нғқн•ҙмЈјм„ёмҡ”.');
                    return;
                }

                const newName = prompt('м„ нғқн•ң л°°мҶЎ кұҙмқҳ лӢҙлӢ№ кё°мӮ¬ мқҙлҰ„мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”:', currentUser);
                if (!newName || newName.trim() === '') return;

                if (confirm(`м„ нғқн•ң ${selectedDriverChangeIds.size}кұҙмқҳ лӢҙлӢ№ кё°мӮ¬лҘј '${newName}'(мңј)лЎң ліҖкІҪн•ҳмӢңкІ мҠөлӢҲк№Ң?`)) {
                    const updated = deliveries.map(d => {
                        if (selectedDriverChangeIds.has(d.id)) {
                            return { ...d, driver: newName };
                        }
                        return d;
                    });

                    setDeliveries(updated);
                    StorageManager.saveDeliveries(updated);
                    setIsDriverChangeMode(false);
                    setSelectedDriverChangeIds(new Set());
                    setToastMsg(`рҹҡҡ лӢҙлӢ№ кё°мӮ¬к°Җ ліҖкІҪлҗҳм—ҲмҠөлӢҲлӢӨ.`);
                    
                    // л§Ңм•Ҫ нҳ„мһ¬ лЎңк·ёмқён•ң мӮ¬мҡ©мһҗк°Җ ліёмқёмқҳ л°°мҶЎ кұҙмқ„ лӢӨлҘё мӮ¬лһҢм—җкІҢ л„ҳкІјлӢӨл©ҙ,
                    // нҷ”л©ҙ к°ұмӢ мқҙ н•„мҡ”н•  мҲҳ мһҲмқҢ (мқҙлҜё лҰ¬м•ЎнҠё мғҒнғң ліҖкІҪмңјлЎң мІҳлҰ¬лҗЁ)
                }
            };

            // [Sync] Form Date -> Target Date (Dashboard Date Filter)
            useEffect(() => {
                // кҙҖлҰ¬мһҗ лӘЁл“ңм—җм„ң м—‘м…Җ м—…лЎңл“ңлЎң мқён•ҙ targetDateк°Җ 'all'мқҙ лҗң кІҪмҡ° form.dateлЎң лҚ®м–ҙм“°м§Җ м•ҠмқҢ
                // лӢЁ, м „мІҙ ліҙкё° лӘЁл“ң(showAllDates)к°Җ нҷңм„ұнҷ”лҗң кІҪмҡ°лҠ” мҳҲмҷё
                if (targetDate !== 'all' && !showAllDates) {
                    setTargetDate(form.date);
                }
            }, [form.date, showAllDates]);

            // [Render] Fatal Error Screen
            if (fatalError) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-red-600 text-white font-sans">
                        <div className="max-w-md w-full bg-white text-red-600 rounded-xl shadow-2xl p-8 text-center">
                            <h1 className="text-3xl font-bold mb-4">Critical Error</h1>
                            <p className="mb-6 text-gray-700 break-words">{fatalError.message}</p>
                            <button onClick={() => { StorageManager.clearAll(); window.location.reload(); }} 
                                    className="bg-red-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-700 transition shadow-lg">
                                Full Reset & Reload
                            </button>
                        </div>
                    </div>
                );
            }



            // [лЎңм§Ғ] лҚ°мқҙн„° к·ёлЈ№нҷ” л°Ҹ м •л ¬ (Active/Inactive л¶„лҰ¬ + Active кұ°лҰ¬мҲң м •л ¬)
            const groupedDeliveries = useMemo(() => {
                // 1. лӮ м§ң н•„н„°л§Ғ л°Ҹ к¶Ңн•ң н•„н„°л§Ғ (кҙҖлҰ¬мһҗлҠ” м „мІҙ, кё°мӮ¬лҠ” ліёмқё л°°м • кұҙл§Ң)
                const filtered = deliveries.filter(d => {
                    // [Fix] targetDateк°Җ 'all'мқҙл©ҙ лӮ м§ң н•„н„° л¬ҙмӢң
                    // [New] 'м „мІҙ лӮ м§ң ліҙкё°' мІҙнҒ¬ мӢң лӮ м§ң н•„н„° л¬ҙмӢң
                    const dateMatch = showAllDates || targetDate === 'all' || d.date === targetDate;
                    
                    let driverMatch = true;
                    if (currentUser === 'admin' || view === 'admin') { // [Fix] кҙҖлҰ¬мһҗ лӘЁл“ңмқј л•ҢлҸ„ м „мІҙ мЎ°нҡҢ к¶Ңн•ң л¶Җм—¬
                        // кҙҖлҰ¬мһҗ: н•„н„° мғҒнғңм—җ л”°лқј мЎ°нҡҢ
                        if (adminDriverFilter === 'all') driverMatch = true;
                        else if (adminDriverFilter === 'unassigned') driverMatch = !d.driver || String(d.driver).trim() === '';
                        else driverMatch = String(d.driver).trim() === String(adminDriverFilter).trim();
                    } else {
                        // кё°мӮ¬: ліёмқё л°°м • кұҙл§Ң мЎ°нҡҢ (м—„кІ© лӘЁл“ң)
                        // [Fix] м—…лЎңл“ңлҗң лҚ°мқҙн„°мқҳ driver мқҙлҰ„ кіөл°ұ мқҙмҠҲ мІҳлҰ¬
                        driverMatch = (d.driver && String(d.driver).trim() === String(currentUser).trim());
                    }
                    
                    return dateMatch && driverMatch;
                });
                
                // 2. мЈјмҶҢ(мўҢн‘ң) + м „нҷ”лІҲнҳё кё°мӨҖ к·ёлЈ№нҷ” (лҸҷмқј мһҘмҶҢлқјлҸ„ м—°лқҪмІҳ лӢӨлҘҙл©ҙ лі„лҸ„ л°°мҶЎ)
                const groups = {};
                filtered.forEach(d => {
                    const isDefault = d.lat === 37.5665 && d.lng === 126.9780;
                    // мўҢн‘ң/мЈјмҶҢ + м „нҷ”лІҲнҳёлЎң мң лӢҲнҒ¬ нӮӨ мғқм„ұ
                    const key = isDefault 
                        ? `${d.address.trim()}_${d.phone}` 
                        : `${d.lat},${d.lng}_${d.phone}`;

                    if (!groups[key]) {
                        // мҙҲкё° к·ёлЈ№ мғқм„ұ
                        groups[key] = { 
                            ...d, 
                            items: d.detail_items ? d.detail_items.map((it, idx) => ({...it, _oid: d.id, _oidx: idx})) : [{ item: d.item, settlement_amount: d.settlement_amount, checked: d.checked, _oid: d.id, _oidx: -1 }], // мғҒм„ё н’ҲлӘ© лҰ¬мҠӨнҠё
                            ids: [d.id],
                            count: 1, // л°°мҶЎ кұҙмҲҳ (Record мҲҳ)
                            completed: d.completed || false,
                            partial: d.partial || false,
                            canceled: d.canceled || false,
                            cancel_type: d.cancel_type || null,
                            install_fee: (d.install_fee || 0),
                            yangjung: (d.yangjung || 0),
                            naerim: (d.naerim || 0),
                            settlement_amount: (d.settlement_amount || 0), // м •мӮ°кёҲм•Ў н•©кі„
                            // [New] н•©міҗм§„ кұҙмқҳ ID м ҖмһҘ (л¶„лҰ¬н•ҳкё° кё°лҠҘмҡ© - л Ҳкұ°мӢң лҚ°мқҙн„° нҳёнҷҳ)
                            mergedId: (d._mergedOriginals || (d.detail_items && d.detail_items.length > 1)) ? d.id : null
                        };
                    } else {
                        // кё°мЎҙ к·ёлЈ№м—җ лі‘н•©
                        if (d.detail_items) {
                            groups[key].items.push(...d.detail_items.map((it, idx) => ({...it, _oid: d.id, _oidx: idx})));
                        } else {
                            groups[key].items.push({ item: d.item, settlement_amount: d.settlement_amount, checked: d.checked, _oid: d.id, _oidx: -1 });
                        }
                        
                        groups[key].ids.push(d.id);
                        groups[key].count++;
                        groups[key].install_fee += (d.install_fee || 0);
                        groups[key].yangjung += (d.yangjung || 0);
                        groups[key].naerim += (d.naerim || 0);
                        groups[key].settlement_amount += (d.settlement_amount || 0);
                        
                        if (!d.completed) groups[key].completed = false;
                        if (!d.canceled) groups[key].canceled = false; 
                        
                        // [Fix] Merge Status Details
                        if (d.partial) groups[key].partial = true;
                        if (d.cancel_type) groups[key].cancel_type = d.cancel_type;
                            if (d.unattended) groups[key].unattended = true;

                        // [New] н•©міҗм§„ кұҙмқҙ лӮҳмӨ‘м—җ м¶”к°Җлҗ  кІҪмҡ° ID м—…лҚ°мқҙнҠё (л Ҳкұ°мӢң лҚ°мқҙн„° нҳёнҷҳ)
                        if (d._mergedOriginals || (d.detail_items && d.detail_items.length > 1)) groups[key].mergedId = d.id;
                    }
                });
                
                const allGroups = Object.values(groups);

                // 3. Active / Inactive л¶„лҰ¬
                // [мҲҳм •] мҷ„лЈҢлҗң н•ӯлӘ©лҸ„ 'Active' к·ёлЈ№м—җ нҸ¬н•Ён•ҳм—¬ TSP кІҪлЎң кі„мӮ° л°Ҹ мҲңлІҲ(sequence_number)мқ„ мң м§Җн•Ё.
                // InactiveлҠ” 'м·ЁмҶҢлҗң' н•ӯлӘ©л§Ң н•ҙлӢ№лҗЁ.
                // м—°кё°(cancel_type === 'postpone')лҠ” м·ЁмҶҢмҷҖ лҸҷмқјн•ҳкІҢ л№„нҷңм„ұ(inactive)лЎң л¶„лҘҳн•ҳм—¬ л§Ё л’ӨлЎң мқҙлҸҷ
                const active = allGroups.filter(g => !g.canceled && g.cancel_type !== 'postpone'); 
                const inactive = allGroups.filter(g => g.canceled || g.cancel_type === 'postpone');

                // 4. Active к·ёлЈ№ м •л ¬ (мҳҲм•ҪмӢңк°„ мҡ°м„  -> TSP Nearest Neighbor)
                // [New] мҳҲм•Ҫ мӢңк°„ мһҲлҠ” кұҙмқҖ мөңмҡ°м„ , лӮҳлЁём§ҖлҠ” 'нҳ„мһ¬ мң„м№ҳм—җм„ң к°ҖмһҘ к°Җк№Ңмҡҙ кіі'мңјлЎң м—°кІ°
                let sortedActive = [];
                const withTime = active.filter(x => x.time);
                const withoutTime = active.filter(x => !x.time);

                // 4-1. мҳҲм•ҪмӢңк°„ мҳӨлҰ„м°ЁмҲң
                withTime.sort((a, b) => a.time.localeCompare(b.time));
                sortedActive = [...withTime];

                // 4-2. Nearest Neighbor (Greedy TSP)
                if (withoutTime.length > 0) {
                    if (startPoint) {
                        // мӢңмһ‘м җ м„Өм •: м¶ңл°ңм§Җ (н•ӯмғҒ м„јн„°м—җм„ң мӢңмһ‘)
                        let currentPos = startPoint;
                        
                        // ліөмӮ¬ліё мғқм„ұ (splice мӮ¬мҡ©мқ„ мң„н•ҙ)
                        const remaining = [...withoutTime];

                        while (remaining.length > 0) {
                            let nearestIdx = -1;
                            let minDist = Infinity;

                            for (let i = 0; i < remaining.length; i++) {
                                const item = remaining[i];
                                const dist = getDistance(currentPos.lat, currentPos.lng, item.lat, item.lng);
                                if (dist < minDist) {
                                    minDist = dist;
                                    nearestIdx = i;
                                }
                            }

                            if (nearestIdx !== -1) {
                                const nextItem = remaining[nearestIdx];
                                sortedActive.push(nextItem);
                                currentPos = nextItem; // лӢӨмқҢ кё°мӨҖм җ мқҙлҸҷ
                                remaining.splice(nearestIdx, 1);
                            } else {
                                // [Safety] кұ°лҰ¬ кі„мӮ° мӢӨнҢЁ л“ұмңјлЎң лӮЁмқҖ н•ӯлӘ©мқҙ мһҲлӢӨл©ҙ лӘЁл‘җ м¶”к°Җ (лҲ„лқҪ л°©м§Җ)
                                sortedActive.push(...remaining);
                                break; 
                            }
                        }
                    } else {
                        // мўҢн‘ң м—Ҷмңјл©ҙ кё°мЎҙ л°©мӢқ(мҲҳлҸҷ мҲңм„ң) мң м§Җ
                        withoutTime.sort((a, b) => (a.sequence_number || 99999) - (b.sequence_number || 99999));
                        sortedActive = [...sortedActive, ...withoutTime];
                    }
                }

                // кұ°лҰ¬ м •ліҙ н• лӢ№ (UI н‘ңмӢңмҡ©)
                if (startPoint) {
                    sortedActive.forEach(item => {
                        // лӢЁмҲңнһҲ м„јн„°мҷҖмқҳ кұ°лҰ¬л§Ң н‘ңмӢңн• м§Җ, кІҪлЎңмғҒ кұ°лҰ¬лҘј н‘ңмӢңн• м§Җ?
                        // UIм—җм„ңлҠ” ліҙнҶө 'м„јн„°лЎңл¶Җн„°мқҳ кұ°лҰ¬'лҘј ліҙм—¬мЈјлҠ” кІғмқҙ мқјл°ҳм Ғмһ„.
                        // н•ҳм§Җл§Ң м •л ¬мқҖ 'кІҪлЎңмҲң'мңјлЎң лҗҳм—ҲмқҢ.
                        item.distanceFromStart = getDistance(startPoint.lat, startPoint.lng, item.lat, item.lng);
                    });
                }

                // 5. мҲңлІҲ н• лӢ№ л°Ҹ мҶҚм„ұ м¶”к°Җ (м¶ңл°ңм§ҖмҷҖ лҸ„м°©м§Җ м ңмҷё)
                const finalActive = sortedActive.map((g, i) => ({
                    ...g,
                    sequence_number: i + 1,
                    is_active: true
                }));

                const finalInactive = inactive.map(g => ({
                    ...g,
                    sequence_number: null,
                    is_active: false
                }));

                // 6. л§Ҳм»Ө л ҢлҚ”л§Ғмҡ© л°°м—ҙ мһ¬кө¬м„ұ: мҲңмҲҳ л°°мҶЎм§Җ лӘ©лЎқл§Ң л°ҳнҷҳ
                // м¶ңл°ңм§Җ/лҸ„м°©м§ҖлҠ” MapViewм—җ startPoint propмңјлЎң лі„лҸ„ м „лӢ¬н•ҳлҜҖлЎң м—¬кё°м„ңлҠ” м ңмҷё
                const mapLocations = [...finalActive, ...finalInactive];
                return mapLocations;
            }, [deliveries, targetDate, startPoint, endPoint, currentUser, adminDriverFilter, view, showAllDates]); // [Fix] view, showAllDates, endPoint мқҳмЎҙм„ұ м¶”к°Җ

            // [Sync] кі„мӮ°лҗң мҲңм„ң(TSP лҳҗлҠ” мҲҳлҸҷ)лҘј лҚ°мқҙн„° мғҒнғңм—җ л°ҳмҳҒ (Persist Order)
            useEffect(() => {
                if (!groupedDeliveries.length) return;
                
                let needsUpdate = false;
                const updates = {}; 

                groupedDeliveries.forEach(g => {
                    if (g.is_active && g.sequence_number) {
                        g.ids.forEach(id => {
                             const item = deliveries.find(d => d.id === id);
                             if (item && item.sequence_number !== g.sequence_number) {
                                 needsUpdate = true;
                                 updates[id] = g.sequence_number;
                             }
                        });
                    }
                });
                
                if (needsUpdate) {
                     setDeliveries(prev => {
                         const next = prev.map(d => {
                             if (updates[d.id]) return { ...d, sequence_number: updates[d.id] };
                             return d;
                         });
                         StorageManager.saveDeliveries(next);
                         return next;
                     });
                }
            }, [groupedDeliveries, deliveries]);

            useEffect(() => {
                const toGeocode = deliveries.filter(d => {
                    const invalid = !d.lat || isNaN(d.lat) || !d.lng || isNaN(d.lng);
                    const attempted = d.geocode_attempted === true;
                    const dateMatch = showAllDates || targetDate === 'all' || d.date === targetDate;
                    return invalid && !attempted && dateMatch;
                });
                if (toGeocode.length === 0) return;
                (async () => {
                    const updates = [];
                    for (const d of toGeocode.slice(0, 10)) {
                        const addr = d.address || ''; // [Fix] formatAddressDisplay() лҢҖмӢ  мӣҗліё мЈјмҶҢ м§Ғм ‘ мӮ¬мҡ© (н‘ңмӢңмҡ© н•ЁмҲҳ кұ°м№ҳл©ҙ мЈјмҶҢ м •ліҙ мҶҗмӢӨлҗЁ)
                        let coords = await geocodeAddress(addr, true);
                        if (!coords) coords = await geocodeAddress(addr, false);
                        if (coords) {
                            updates.push({ id: d.id, lat: coords.lat, lng: coords.lng, geocode_attempted: true });
                        } else {
                            updates.push({ id: d.id, geocode_attempted: true });
                        }

            function deleteDeliveriesByDateRange(startStr, endStr) {
                try {
                    const normalize = (s) => parseCustomDate(s);
                    const start = new Date(normalize(startStr));
                    const end = new Date(normalize(endStr));
                    if (isNaN(start.getTime()) || isNaN(end.getTime())) {
                        alert('лӮ м§ң лІ”мң„лҘј н•ҙм„қн•  мҲҳ м—ҶмҠөлӢҲлӢӨ.');
                        return;
                    }
                    const before = deliveries.length;
                    const filtered = deliveries.filter(d => {
                        const ds = normalize(d.date);
                        const dx = new Date(ds || d.date);
                        if (isNaN(dx.getTime())) return true;
                        return dx < start || dx > end;
                    });
                    const removed = before - filtered.length;
                    setDeliveries(filtered);
                    StorageManager.saveDeliveries(filtered);
                    setToastMsg(`рҹ—‘пёҸ ${removed}кұҙ мӮӯм ң ( ${startStr} ~ ${endStr} )`);

            function readJsonFileWithEncoding(file, cb) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const buf = ev.target.result;
                    let text = '';
                    let data = null;
                    
                    // 1. Try UTF-8 first (Strict Check for пҝҪ)
                    try {
                        text = new TextDecoder('utf-8').decode(buf);
                        const temp = JSON.parse(text);
                        // If it parses but has replacement characters, it might be EUC-KR
                        if (text.includes('\uFFFD')) {
                             throw new Error('Suspicious UTF-8 with replacement characters');
                        }
                        data = temp;
                    } catch (e) {
                        // UTF-8 parse failed or was suspicious
                    }
                    
                    // 2. Try EUC-KR if UTF-8 failed or was suspicious
                    if (!data) {
                        try {
                            text = new TextDecoder('euc-kr').decode(buf);
                            data = JSON.parse(text);
                        } catch (e) {
                            // EUC-KR failed too
                        }
                    }
                    
                    // 3. Fallback: If strict UTF-8 failed but EUC-KR also failed, 
                    // use loose UTF-8 (maybe it really had пҝҪ)
                    if (!data) {
                        try {
                            text = new TextDecoder('utf-8').decode(buf);
                            data = JSON.parse(text);
                        } catch {}
                    }

                    if (!data) {
                        alert('нҢҢмқј мқёмҪ”л”©мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”. UTF-8 лҳҗлҠ” EUC-KR нҳ•мӢқмқ„ к¶ҢмһҘн•©лӢҲлӢӨ.');
                        return;
                    }
                    cb(data);
                };
                reader.readAsArrayBuffer(file);
            }

            // [кё°лҠҘ] нҢҢмқј м—…лЎңл“ң (мғҒн’Ҳ нҶөн•© лЎңм§Ғ м Ғмҡ©)
            async function handleFileUpload(e) {
                const file = e.target.files[0];
                if (!file) return;

                // [New] Auto Backup: лҚ®м–ҙм“°кё° м „ лҚ°мқҙн„° мһҗлҸҷ л°ұм—…
                if (deliveries.length > 0) {
                    try {
                        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                        const backupKey = `mvp_backup_auto_${timestamp}`;
                        const backupData = {
                            timestamp: new Date().toISOString(),
                            deliveries: deliveries,
                            reason: 'before_upload'
                        };
                        StorageManager.set(backupKey, backupData);
                        
                        // л°ұм—… лӘ©лЎқ кҙҖлҰ¬ (мөңк·ј 5к°ңл§Ң мң м§Җ)
                        const backupList = StorageManager.get('mvp_backup_list') || [];
                        backupList.unshift({ key: backupKey, time: new Date().toLocaleString(), count: deliveries.length });
                        if (backupList.length > 5) {
                            const removed = backupList.pop();
                            StorageManager.remove(removed.key);
                        }
                        StorageManager.set('mvp_backup_list', backupList);
                        console.log(`[Auto Backup] Saved to ${backupKey}`);
                    } catch(err) {
                        console.warn("Auto backup failed:", err);
                    }
                }

                setUploadedFileName(file.name); // нҢҢмқјлӘ… н‘ңмӢң
                setLoading(true);

                try {
                    const workbook = new ExcelJS.Workbook();
                    await workbook.xlsx.load(await file.arrayBuffer());
                    const sheet = workbook.worksheets[0];
                    
                    // н—ӨлҚ” м°ҫкё°
                    const header = { 
                        date: -1, order_number: -1, invoice_number: -1, item: -1, 
                        phone: -1, address: -1, center: -1, region: -1, 
                        settlement_amount: -1, driver: -1,
                        // [New] мғҒм„ё л№„мҡ© м»¬лҹј м¶”к°Җ
                        install_fee: -1, yangjung: -1, naerim: -1, etc_fee: -1
                    };

                    sheet.getRow(1).eachCell((cell, col) => {
                        const val = cell.value ? cell.value.toString().trim() : '';
                        if(val.includes('лӮ м§ң')) header.date = col;
                        if(val.includes('мЈјл¬ё') || val.includes('мҳӨлҚ”')) header.order_number = col;
                        if(val.includes('мҡҙмҶЎмһҘ') || val.includes('мҶЎмһҘ') || val.includes('мқёліҙмқҙмҠӨ')) header.invoice_number = col;
                        if(val.includes('м ңн’Ҳ') || val.includes('мғҒн’Ҳ')) header.item = col;
                        if(val.includes('м•ҲмӢ¬лІҲнҳё') || val.includes('м „нҷ”')) header.phone = col;
                        if(val.includes('мЈјмҶҢ')) header.address = col;
                        if(val.includes('кё°мӮ¬') || val.includes('лӢҙлӢ№')) header.driver = col;
                        
                        // л№„мҡ© кҙҖл Ё м»¬лҹј л§Өн•‘
                        if(val.includes('лӢЁк°Җ') || val.includes('кёҲм•Ў') || val.includes('м •мӮ°')) header.settlement_amount = col;
                        if(val.includes('м„Өм№ҳл№„') || val.includes('м„Өм№ҳ')) header.install_fee = col;
                        if(val.includes('м–‘мӨ‘')) header.yangjung = col;
                        if(val.includes('лӮҙлҰј')) header.naerim = col;
                        if(val.includes('кё°нғҖ')) header.etc_fee = col;

                        // Legacy support (optional)
                        if(val.includes('м„јн„°')) header.center = col;
                        if(val.includes('м§Җм—ӯ')) header.region = col;
                    });

                    if (header.address === -1 || header.item === -1) {
                        throw new Error("н•„мҲҳ м»¬лҹј(мЈјмҶҢ, мғҒн’Ҳ)мқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.");
                    }

                    let lastDate = '';
                    let lastOrder = '';
                    let lastInvoice = '';
                    let lastAddress = '';
                    let lastPhone = '';
                    let lastCenter = '';
                    let lastRegion = '';
                    let lastDriver = '';
                    
                    // 1м°Ё нҢҢмӢұ: Raw лҚ°мқҙн„° м¶”м¶ң
                    const rawRows = [];
                    sheet.eachRow((row, rowNum) => {
                        if(rowNum === 1) return;

                        const getVal = (colIdx) => {
                            if (colIdx === -1) return null;
                            const cell = row.getCell(colIdx);
                            if (cell.value && typeof cell.value === 'object') {
                                if (cell.value.richText) return cell.value.richText.map(r => r.text).join('');
                                if (cell.value.text) return cell.value.text;
                                if (cell.value.result) return cell.value.result; 
                            }
                            return cell.value;
                        };

                        // [Helper] кёҲм•Ў нҢҢмӢұ (мҪӨл§Ҳ м ңкұ° л°Ҹ мҲ«мһҗ ліҖнҷҳ)
                        const parseMoney = (v) => {
                            if (!v) return 0;
                            if (typeof v === 'number') return v;
                            // л¬ёмһҗм—ҙмқё кІҪмҡ° мҪӨл§Ҳ, мӣҗ, кіөл°ұ л“ұ м ңкұ°н•ҳкі  мҲ«мһҗл§Ң м¶”м¶ң
                            const str = String(v).replace(/[^\d.-]/g, '');
                            const num = Number(str);
                            return isNaN(num) ? 0 : num;
                        };

                        let dateRaw = getVal(header.date);
                        let orderRaw = getVal(header.order_number);
                        let invoiceRaw = getVal(header.invoice_number);
                        let address = getVal(header.address);
                        let phone = getVal(header.phone);
                        let item = getVal(header.item);
                        let centerRaw = getVal(header.center);
                        let regionRaw = getVal(header.region);
                        let driver = getVal(header.driver);
                        
                        // л№„мҡ© м¶”м¶ң
                        let settlementRaw = getVal(header.settlement_amount);
                        let installRaw = getVal(header.install_fee);
                        let yangjungRaw = getVal(header.yangjung);
                        let naerimRaw = getVal(header.naerim);
                        let etcRaw = getVal(header.etc_fee);

                        // Fill-down лЎңм§Ғ
                        if (address) {
                            lastAddress = address.toString().trim();
                            if (dateRaw) lastDate = dateRaw;
                            if (orderRaw) lastOrder = orderRaw.toString().trim();
                            if (invoiceRaw) lastInvoice = invoiceRaw.toString().trim();
                            if (phone) lastPhone = phone.toString().trim();
                            if (centerRaw) lastCenter = centerRaw.toString().trim();
                            if (regionRaw) lastRegion = regionRaw.toString().trim();
                            if (driver) lastDriver = driver.toString().trim();
                        }
                        
                        if (!dateRaw && lastDate) dateRaw = lastDate;
                        if (!orderRaw && lastOrder) orderRaw = lastOrder;
                        if (!invoiceRaw && lastInvoice) invoiceRaw = lastInvoice;
                        if (!phone && lastPhone) phone = lastPhone;
                        if (!centerRaw && lastCenter) centerRaw = lastCenter;
                        if (!regionRaw && lastRegion) regionRaw = lastRegion;
                        if (!driver && lastDriver) driver = lastDriver;

                        if (lastAddress && item) {
                            // л№„мҡ© мҡ°м„ мҲңмң„ кІ°м •: мғҒм„ё м»¬лҹјмқҙ мһҲмңјл©ҙ мӮ¬мҡ©, м—Ҷмңјл©ҙ нҶөн•© м»¬лҹј мӮ¬мҡ©
                            let iFee = parseMoney(installRaw);
                            const yFee = parseMoney(yangjungRaw);
                            const nFee = parseMoney(naerimRaw);
                            const eFee = parseMoney(etcRaw);
                            
                            // мғҒм„ё м„Өм№ҳл№„к°Җ 0мқҙкі  нҶөн•© кёҲм•Ўмқҙ мһҲлӢӨл©ҙ нҶөн•© кёҲм•Ўмқ„ м„Өм№ҳл№„лЎң к°„мЈј (Legacy нҳёнҷҳ)
                            if (iFee === 0 && parseMoney(settlementRaw) > 0 && yFee === 0 && nFee === 0 && eFee === 0) {
                                iFee = parseMoney(settlementRaw);
                            }

                            rawRows.push({
                                rawDate: dateRaw,
                                order_number: orderRaw || '',
                                invoice_number: invoiceRaw || '',
                                address: lastAddress,
                                phone: lastPhone || '',
                                item: item.toString().trim(),
                                center: centerRaw || '',
                                region: regionRaw || '',
                                driver: driver ? String(driver).trim() : '',
                                // л№„мҡ© лҚ°мқҙн„°
                                install_fee: iFee,
                                yangjung: yFee,
                                naerim: nFee,
                                etc_fee: eFee
                            });
                        }
                    });

                    // [мҶҚлҸ„ к°ңм„ ] лҢҖлҹү нҢҢмӢұ м§Ғнӣ„ н•ң нӢұ м–‘ліҙ (UI л°ҳмқ‘м„ұ нҷ•ліҙ)
                    await new Promise(r => setTimeout(r, 0));

                    // [кІҖмҰқ лЎңм§Ғ] 1м°Ё мһҗлҸҷ лҢҖмЎ° л°Ҹ лЎңк·ё мғқм„ұ
                    const validationLogs = [];
                    const phoneGroups = {}; // м „нҷ”лІҲнҳё кё°мӨҖ к·ёлЈ№нҷ” (кІҖмҰқмҡ©)

                    rawRows.forEach(row => {
                        const phoneKey = String(row.phone).replace(/\D/g, '');
                        if (!phoneGroups[phoneKey]) phoneGroups[phoneKey] = new Set();
                        phoneGroups[phoneKey].add(row.address); // мӣҗліё мЈјмҶҢ м ҖмһҘ
                    });

                    // л¶Ҳмқјм№ҳ н•ӯлӘ©(лҸҷмқј м „нҷ”лІҲнҳёмқёлҚ° мЈјмҶҢк°Җ лҜём„ён•ҳкІҢ лӢӨлҘё кІҪмҡ°) к°җм§Җ
                    Object.entries(phoneGroups).forEach(([phone, addresses]) => {
                        if (addresses.size > 1) {
                            const addrList = Array.from(addresses);
                            validationLogs.push({
                                type: 'mismatch',
                                phone: phone,
                                msg: `лҸҷмқј м—°лқҪмІҳ(${phone})м—җ м„ңлЎң лӢӨлҘё мЈјмҶҢ ${addresses.size}кұҙ л°ңкІ¬ (мһҗлҸҷ л¶„лҰ¬лҗЁ)`,
                                details: addrList
                            });
                        }
                    });

                    // 2м°Ё к°Җкіө: мЈјмҶҢ+кё°мӮ¬ кё°мӨҖ лі‘н•©
                    // (мЈјмҶҢк°Җ к°ҷм•„лҸ„ кё°мӮ¬к°Җ лӢӨлҘҙл©ҙ лі„лҸ„ м •мӮ° кұҙмңјлЎң мІҳлҰ¬н•ҙм•ј н•Ё)
                    const mergedMap = new Map();

                    // [мҶҚлҸ„ к°ңм„ ] мқҙлІӨнҠё лЈЁн”„м—җ м–‘ліҙн•ҳм—¬ UI лЁјм Җ к·ёлҰ¬кё°
                    await new Promise(r => setTimeout(r, 0));

                    rawRows.forEach(row => {
                        // [мҲҳм •] мЈјмҶҢ + кё°мӮ¬ м •ліҙлЎң к·ёлЈ№нҷ”
                        // кё°мӮ¬к°Җ лӢӨлҘҙл©ҙ мЈјмҶҢк°Җ к°ҷм•„лҸ„ м„һмқҙм§Җ м•ҠлҸ„лЎқ н•Ё
                        const strictKey = `${row.address.trim()}_${row.driver || 'unknown'}`;
                        
                        if (!mergedMap.has(strictKey)) {
                            mergedMap.set(strictKey, {
                                rawDate: row.rawDate,
                                order_number: row.order_number,
                                invoice_number: row.invoice_number,
                                address: row.address, 
                                phone: row.phone,
                                driver: row.driver,
                                center: row.center,
                                region: row.region,
                                items: [], 
                                totalInstallFee: 0,
                                totalYangjung: 0,
                                totalNaerim: 0,
                                totalEtc: 0
                            });
                        }
                        
                        const group = mergedMap.get(strictKey);
                        group.items.push({
                            item: row.item,
                            install_fee: row.install_fee,
                            yangjung: row.yangjung,
                            naerim: row.naerim,
                            etc_fee: row.etc_fee
                        });
                        group.totalInstallFee += row.install_fee;
                        group.totalYangjung += row.yangjung;
                        group.totalNaerim += row.naerim;

                        // [Fix] м№ҙм№ҙмҳӨл§ө лЎңл“ң нҷ•мқё нӣ„ м§ҖмҳӨмҪ”л”© мӢӨн–ү
                        const startGeocode = (data, attempt = 0) => {

                    } else {

            // [кё°лҠҘ] м¶ңл°ңм§Җ м„Өм •
            async function handleSetStartPoint() {
                const addr = prompt("м¶ңл°ңм§Җ мЈјмҶҢлҘј мһ…л Ҙн•ҳм„ёмҡ”:", startPoint?.address || "");
                if (addr) {
                    let cleanAddr = addr;
                    const tokens = cleanAddr.split(/\s+/);
                    let targetIndex = -1;
                    for (let i = 0; i < tokens.length; i++) {
                        if (/^\d+(-\d+)?$/.test(tokens[i]) || tokens[i].endsWith('лІҲм§Җ')) {
                            targetIndex = i;
                            break;
                        }
                    }
                    if (targetIndex !== -1) {
                        cleanAddr = tokens.slice(0, targetIndex + 1).join(' ');
                    } else if (tokens.length > 4) {
                        cleanAddr = tokens.slice(0, 4).join(' ');
                    }

                    const coords = await geocodeAddress(cleanAddr);
                    const newStart = { ...coords, address: addr };
                    setStartPoint(newStart);
                    StorageManager.set('mvp_start_point', newStart);
                }
            }
            
            // мўҢн‘ңк°Җ fallback кё°ліёк°’ к·јмІҳмқём§Җ нҷ•мқё (к№ҖнҸ¬мӢңмІӯ, м„ңмҡёмӢңмІӯ л“ұ)
            function isFallbackCoord(lat, lng) {
                const fallbacks = [
                    { lat: 37.6152, lng: 126.7156 }, // к№ҖнҸ¬
                    { lat: 37.5665, lng: 126.9780 }, // м„ңмҡё
                    { lat: 37.4563, lng: 126.7052 }, // мқёмІң
                    { lat: 37.6153, lng: 126.7150 }, // к№ҖнҸ¬2
                ];
                return fallbacks.some(f => Math.abs(lat - f.lat) < 0.02 && Math.abs(lng - f.lng) < 0.02);
            }

            async function backgroundGeocode(list) {
                const pending = (list || []).filter(d => {
                    const lat = Number(d.lat);
                    const lng = Number(d.lng);
                    // мўҢн‘ң м—Ҷкұ°лӮҳ fallback кё°ліёк°’мқҙл©ҙ мһ¬мӢңлҸ„
                    const noCoord = isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0;
                    const isFallback = !noCoord && isFallbackCoord(lat, lng);
                    return (noCoord || isFallback) && d.address && d.geocode_pending !== false;
                });
                if (pending.length === 0) return;
                
                // м§Җм—ӯлі„ fallback мўҢн‘ң кі„мӮ° н•ЁмҲҳ
                const getFallbackCoord = (addr) => {
                    let lat = 37.5665, lng = 126.9780;
                    if (addr.includes('мқёмІң')) { lat = 37.4563; lng = 126.7052; }
                    else if (addr.includes('к№ҖнҸ¬')) { lat = 37.6153; lng = 126.7150; }
                    else if (addr.includes('л¶ҖмІң')) { lat = 37.5034; lng = 126.7660; }
                    else if (addr.includes('кі м–‘') || addr.includes('мқјмӮ°')) { lat = 37.6584; lng = 126.8320; }
                    else if (addr.includes('нҢҢмЈј')) { lat = 37.7600; lng = 126.7800; }
                    else if (addr.includes('мӢңнқҘ')) { lat = 37.3800; lng = 126.8000; }
                    else if (addr.includes('кҙ‘лӘ…')) { lat = 37.4785; lng = 126.8646; }
                    else if (addr.includes('м•ҲмӮ°')) { lat = 37.3219; lng = 126.8308; }
                    else if (addr.includes('м•Ҳм–‘')) { lat = 37.3943; lng = 126.9568; }
                    else if (addr.includes('мҲҳмӣҗ')) { lat = 37.2636; lng = 127.0286; }
                    else if (addr.includes('м„ұлӮЁ') || addr.includes('л¶„лӢ№')) { lat = 37.4200; lng = 127.1265; }
                    else if (addr.includes('мҡ©мқё')) { lat = 37.2410; lng = 127.1775; }
                    else if (addr.includes('нҷ”м„ұ')) { lat = 37.1995; lng = 126.8315; }
                    const s = String(addr);
                    let h = 0; for (let j = 0; j < s.length; j++) { h = ((h * 31) + s.charCodeAt(j)) >>> 0; }
                    lat += ((h % 21) - 10) * 0.005;
                    lng += ((((h >> 5) % 21) - 10) * 0.005);
                    return { lat, lng };
                };

                let i = 0;
                const geocodeResults = {};
                const workers = Math.min(4, Math.max(1, pending.length));
                const run = async () => {
                    while (i < pending.length) {
                        const idx = i++;
                        const d = pending[idx];
                        const addr = d.address || '';
                        let c = await geocodeAddress(addr, true);
                        if (!c) c = await geocodeAddress(addr, false);

                        geocodeResults[d.id] = c ? { lat: c.lat, lng: c.lng } : getFallbackCoord(d.address || '');

                        // UI мҰүмӢң л°ҳмҳҒ (лЎңм»¬ м ҖмһҘл§Ң, нҒҙлқјмҡ°л“ңлҠ” м „мІҙ мҷ„лЈҢ нӣ„)
                        setDeliveries(prev => {
                            const next = prev.map(x => {
                                if (x.id === d.id) {
                                    const coord = geocodeResults[d.id];
                                    return { ...x, lat: coord.lat, lng: coord.lng, geocode_pending: false };
                                }
                                return x;
                            });
                            // лЎңм»¬м—җл§Ң м ҖмһҘ (saveDeliveries лҢҖмӢ  м§Ғм ‘ localStorage)
                            try { localStorage.setItem('mvp_deliveries', JSON.stringify(next)); } catch(e) {}
                            return next;
                        });
                    }
                };

                await Promise.all(Array.from({ length: workers }).map(() => run()));

                // [Fix] м§ҖмҳӨмҪ”л”© м „мІҙ мҷ„лЈҢ нӣ„ Supabaseм—җ н•ң лІҲл§Ң м—…лЎңл“ң
                setDeliveries(prev => {
                    const final = prev.map(x => {
                        if (geocodeResults[x.id]) {
                            return { ...x, ...geocodeResults[x.id], geocode_pending: false };
                        }
                        return x;
                    });
                    StorageManager.saveDeliveries(final); // мқҙ мӢңм җм—җ нҒҙлқјмҡ°л“ң лҸҷкё°нҷ”
                    console.log('[Geocode] мҷ„лЈҢ - Supabase лҸҷкё°нҷ”');
                    return final;
                });
            }

            // [кё°лҠҘ] GPSлЎң м¶ңл°ңм§Җ м„Өм •
            function handleGPSStartPoint() {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    // м—ӯм§ҖмҳӨмҪ”л”© мғқлһө (лӢЁмҲң мўҢн‘ң мӮ¬мҡ©)
                    const newStart = { ...coords, address: 'нҳ„мһ¬ мң„м№ҳ (GPS)' };
                    setStartPoint(newStart);
                    StorageManager.set('mvp_start_point', newStart);
                }, () => alert("мң„м№ҳ к¶Ңн•ңмқҙ н•„мҡ”н•©лӢҲлӢӨ."));
            }

            // [кё°лҠҘ] мўҢн‘ң ліҙм • (м„ңмҡё мҸ лҰј нҳ„мғҒ мҲҳм •)
            async function fixCoordinates() {
                if (!confirm("лӘЁл“  л°°мҶЎм§Җмқҳ мўҢн‘ңлҘј мһ¬кІҖмҰқн•ҳкі  ліҙм •н•ҳмӢңкІ мҠөлӢҲк№Ң? (мӢңк°„мқҙ мҶҢмҡ”лҗ  мҲҳ мһҲмҠөлӢҲлӢӨ)")) return;
                
                setLoading(true);
                const updated = [...deliveries];
                let fixCount = 0;

                // мҲңм°Ё мІҳлҰ¬
                for (let i = 0; i < updated.length; i++) {
                    const d = updated[i];
                    const isSeoulDefault = d.lat === 37.5665 && d.lng === 126.9780;
                    const addressHasSeoul = d.address.includes('м„ңмҡё');
                    
                    // м„ңмҡёмқҙ м•„лӢҢлҚ° м„ңмҡё мӢңмІӯ мўҢн‘ң(кё°ліёк°’)лҘј к°Җм§„ кІҪмҡ° мһ¬кІҖмҰқ
                    if (isSeoulDefault && !addressHasSeoul) {
                        const newCoords = await geocodeAddress(d.address);
                        // мўҢн‘ңк°Җ ліҖкІҪлҗҳм—Ҳмңјл©ҙ м—…лҚ°мқҙнҠё
                        if (newCoords.lat !== d.lat || newCoords.lng !== d.lng) {
                            updated[i] = { ...d, ...newCoords };
                            fixCount++;
                        }
                    }
                }

                if (fixCount > 0) {
                    setDeliveries(updated);
                    StorageManager.saveDeliveries(updated);
                    alert(`${fixCount}кұҙмқҳ мўҢн‘ңк°Җ ліҙм •лҗҳм—ҲмҠөлӢҲлӢӨ.`);
                } else {
                    alert("ліҙм •мқҙ н•„мҡ”н•ң лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.");
                }
                setLoading(false);
            }

            // [кё°лҠҘ] мғҒн’Ҳ мІҙнҒ¬ нҶ кёҖ
            function toggleItemCheck(oid, oidx) {
                setDeliveries(prev => {
                    const next = prev.map(d => {
                        if (d.id === oid) {
                            if (oidx === -1) {
                                // лӢЁмқј мғҒн’Ҳ лӘЁл“ң
                                return { ...d, checked: !d.checked };
                            } else if (d.detail_items && d.detail_items[oidx]) {
                                // мғҒм„ё н’ҲлӘ© лӘЁл“ң
                                const newItems = [...d.detail_items];
                                newItems[oidx] = { ...newItems[oidx], checked: !newItems[oidx].checked };
                                return { ...d, detail_items: newItems };
                            }
                        }
                        return d;
                    });
                    StorageManager.saveDeliveries(next);
                    return next;
                });
            }

            // [кё°лҠҘ] к·ёлЈ№м—җ мғҒн’Ҳ м¶”к°Җ (мІ« лІҲм§ё мӣҗліём—җ мғҒм„ё н’ҲлӘ©мңјлЎң м¶”к°Җ)
            function addGroupItem(ids) {
                if (!ids || ids.length === 0) return;

                setDeliveries(prev => {
                    const next = prev.map(d => {
                        if (d.id === targetId) {
                            let items = d.detail_items ? [...d.detail_items] : null;

                                // кё°мЎҙ лӢЁмқј н•ӯлӘ©мқ„ мғҒм„ёлЎң мҠ№кІ©
                                items = [{ item: d.item || 'мғҒн’Ҳ', checked: !!d.checked, settlement_amount: d.settlement_amount || 0 }];

                        return d;

                    StorageManager.saveDeliveries(next);
